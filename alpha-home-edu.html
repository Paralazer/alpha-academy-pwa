function mergeState(local, remote) {
  if (!remote || typeof remote !== 'object') return local;
  const merged = JSON.parse(JSON.stringify(local));

  // Merge completed (union — a done tick on either device stays done)
  ['ethan', 'elaina'].forEach(child => {
    merged.completed[child] = merged.completed[child] || {};
    const rem = (remote.completed && remote.completed[child]) || {};
    Object.assign(merged.completed[child], rem);
  });

  // Merge milestones (union)
  const remMs = remote.milestones || {};
  Object.keys(remMs).forEach(k => {
    if (!merged.milestones[k]) merged.milestones[k] = remMs[k];
  });

  // Merge journal entries by ID (union, no duplicates)
  const remJournal = remote.journal || [];
  const localIds = new Set((merged.journal || []).map(e => e.id));
  remJournal.forEach(e => { if (!localIds.has(e.id)) merged.journal.unshift(e); });

  // Merge checkins by date+parent — propagate summary_pending:false from remote (daemon clears it)
  const remCheckins = remote.checkins || [];
  if (!merged.checkins) merged.checkins = [];
  const localCkMap = {};
  merged.checkins.forEach(function(c, i) { localCkMap[c.date + '_' + (c.parent || '')] = i; });
  remCheckins.forEach(function(c) {
    const key = c.date + '_' + (c.parent || '');
    if (key in localCkMap) {
      if (!c.summary_pending && merged.checkins[localCkMap[key]].summary_pending) {
        merged.checkins[localCkMap[key]].summary_pending = false;
      }
    } else {
      merged.checkins.push(c);
    }
  });

  // Merge comments (union by ts)
  const remComments = remote.comments || [];
  if (!merged.comments) merged.comments = [];
  const localCmTs = new Set(merged.comments.map(c => c.ts));
  remComments.forEach(c => { if (!localCmTs.has(c.ts)) merged.comments.push(c); });

  // Merge dailyPlans (additive, remote wins per key)
  const remPlans = remote.dailyPlans || {};
  if (!merged.dailyPlans) merged.dailyPlans = {};
  Object.keys(remPlans).forEach(k => {
    merged.dailyPlans[k] = Object.assign({}, merged.dailyPlans[k] || {}, remPlans[k]);
  });

  // dayOverrides: remote wins
  if (remote.dayOverrides) Object.assign(merged.dayOverrides, remote.dayOverrides);

  // weeklyEvents: replace if remote has data
  if (remote.weeklyEvents && remote.weeklyEvents.length) {
    merged.weeklyEvents = remote.weeklyEvents;
    if (remote.eventsLastFetched) merged.eventsLastFetched = remote.eventsLastFetched;
  }

  // buyNext: union by ts; remote status wins for existing items
  const remBuyNext = remote.buyNext || [];
  if (!merged.buyNext) merged.buyNext = [];
  const localBuyTs = new Set(merged.buyNext.map(b => b.ts));
  remBuyNext.forEach(b => {
    if (!localBuyTs.has(b.ts)) { merged.buyNext.push(b); }
    else {
      const local = merged.buyNext.find(lb => lb.ts === b.ts);
      if (local && b.status && b.status !== 'suggested') local.status = b.status;
    }
  });

  // pdfPacks: union by ts
  const remPdfs = remote.pdfPacks || [];
  if (!merged.pdfPacks) merged.pdfPacks = [];
  const localPdfTs = new Set(merged.pdfPacks.map(p => p.ts));
  remPdfs.forEach(p => { if (!localPdfTs.has(p.ts)) merged.pdfPacks.push(p); });

  // scheduleConfig: remote wins (daemon writes this)
  if (remote.scheduleConfig) merged.scheduleConfig = Object.assign({}, merged.scheduleConfig, remote.scheduleConfig);

  // trackers: merge additive — remote wins for numeric totals (highest wins), union arrays
  if (remote.trackers) {
    if (!merged.trackers) merged.trackers = JSON.parse(JSON.stringify(defaultState.trackers));
    const rt = remote.trackers;
    if (rt.reading_streak) {
      merged.trackers.reading_streak.best = Math.max(merged.trackers.reading_streak.best || 0, rt.reading_streak.best || 0);
      if ((rt.reading_streak.last_date || '') >= (merged.trackers.reading_streak.last_date || '')) {
        merged.trackers.reading_streak.current = rt.reading_streak.current || 0;
        merged.trackers.reading_streak.last_date = rt.reading_streak.last_date;
      }
    }
    if (rt.sight_words) {
      merged.trackers.sight_words.count = Math.max(merged.trackers.sight_words.count || 0, rt.sight_words.count || 0);
      const sw = new Set([...(merged.trackers.sight_words.words || []), ...(rt.sight_words.words || [])]);
      merged.trackers.sight_words.words = [...sw];
    }
    if (rt.swim_distance) {
      merged.trackers.swim_distance.total_m = Math.max(merged.trackers.swim_distance.total_m || 0, rt.swim_distance.total_m || 0);
      const sdTs = new Set((merged.trackers.swim_distance.sessions || []).map(s => s.date));
      (rt.swim_distance.sessions || []).forEach(s => { if (!sdTs.has(s.date)) merged.trackers.swim_distance.sessions.push(s); });
    }
    if (rt.bmx_level) {
      merged.trackers.bmx_level.level = Math.max(merged.trackers.bmx_level.level || 0, rt.bmx_level.level || 0);
      const bu = new Set([...(merged.trackers.bmx_level.unlocked || []), ...(rt.bmx_level.unlocked || [])]);
      merged.trackers.bmx_level.unlocked = [...bu];
    }
    if (rt.climbing) {
      if (rt.climbing.top_grade) merged.trackers.climbing.top_grade = rt.climbing.top_grade;
      const clTs = new Set((merged.trackers.climbing.sessions || []).map(s => s.date));
      (rt.climbing.sessions || []).forEach(s => { if (!clTs.has(s.date)) merged.trackers.climbing.sessions.push(s); });
    }
    if (rt.math_facts) {
      merged.trackers.math_facts.within10 = Math.max(merged.trackers.math_facts.within10 || 0, rt.math_facts.within10 || 0);
      merged.trackers.math_facts.within20 = Math.max(merged.trackers.math_facts.within20 || 0, rt.math_facts.within20 || 0);
    }
  }

  return merged;
}

function syncPull() {
  if (!SYNC_CONFIG.enabled || !SYNC_CONFIG.binId || !SYNC_CONFIG.apiKey) return;
  updateSyncStatus('Syncing...', 'syncing');
  fetch('https://api.jsonbin.io/v3/b/' + SYNC_CONFIG.binId + '/latest', {
    headers: { 'X-Master-Key': SYNC_CONFIG.apiKey }
  })
  .then(r => r.json())
  .then(data => {
    const remote = data && data.record;
    if (remote && typeof remote === 'object' && Object.keys(remote).length > 0) {
      appState = mergeState(appState, remote);
      try { localStorage.setItem('alpha-home-edu', JSON.stringify(appState)); } catch(e) {}
      renderRhythm();
      renderStages();
      const weeklyPanel = document.getElementById('tab-weekly');
      if (weeklyPanel && weeklyPanel.classList.contains('active')) renderWeekly();
      const journalPanel = document.getElementById('tab-journal');
      if (journalPanel && journalPanel.classList.contains('active')) renderJournal();
      const yesterdayPanel = document.getElementById('tab-yesterday');
      if (yesterdayPanel && yesterdayPanel.classList.contains('active')) renderYesterday();
      const commentsPanel = document.getElementById('tab-comments');
      if (commentsPanel && commentsPanel.classList.contains('active')) renderComments();
      const eventsPanel = document.getElementById('tab-events');
      if (eventsPanel && eventsPanel.classList.contains('active')) renderEvents();
      const buynextPanel = document.getElementById('tab-buynext');
      if (buynextPanel && buynextPanel.classList.contains('active')) renderBuyNext();
    }
    const now = new Date();
    updateSyncStatus('Synced ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 'ok');
  })
  .catch(() => updateSyncStatus('Offline (local only)', 'offline'));
}

function syncPush() {
  if (!SYNC_CONFIG.enabled || !SYNC_CONFIG.binId || !SYNC_CONFIG.apiKey) return;
  fetch('https://api.jsonbin.io/v3/b/' + SYNC_CONFIG.binId, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': SYNC_CONFIG.apiKey
    },
    body: JSON.stringify(appState)
  })
  .then(() => {
    const now = new Date();
    updateSyncStatus('Saved ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 'ok');
  })
  .catch(() => updateSyncStatus('Offline (local only)', 'offline'));
}

function ageInMonths(dob) {
  const d = new Date(dob), now = new Date();
  return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());
}

function ageLabel(months) {
  const y = Math.floor(months / 12), m = months % 12;
  return y > 0 ? `${y}y ${m}m` : `${m}m`;
}

function currentStage(dob) {
  const months = ageInMonths(dob);
  return AGE_STAGES.find(s => months >= s.monthsMin && months < s.monthsMax) || AGE_STAGES[AGE_STAGES.length - 1];
}

function pillarBadge(p) {

}

function isGrandparentDay() {
  const d = new Date().getDay(); // 0=Sun, 1=Mon, 2=Tue, 3=Wed
  return d >= 1 && d <= 3;
}

function todayDayName() {

function renderDaySchedule(mode) {
  var now = new Date();
  var hhmm = now.getHours()*60 + now.getMinutes();
  var today = now.toISOString().slice(0,10);
  var plan = (appState.dailyPlans || {})[today] || {};
  var cfg = appState.scheduleConfig || {};

  function toMin(t) { var p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
  function isCurrent(start, next) { return hhmm >= toMin(start) && hhmm < toMin(next); }

  var slots = [
    { key:'wake_learn_am',  time: cfg.wake_learn_am||'09:00', nextTime: cfg.play_start||'10:30',    label:'Wake + Learn (AM)',      suppressed: mode==='lansdowne', doneKey:'ethan_am_done' },
    { key:'play_start',     time: cfg.play_start||'10:30',    nextTime: cfg.nap_start||'14:30',     label:'Play / Out',             suppressed: false,               doneKey:null },
    { key:'nap_start',      time: cfg.nap_start||'14:30',     nextTime: cfg.wake_learn_pm||'17:30', label:'Nap Window',             suppressed: false,               doneKey:null },
    { key:'wake_learn_pm',  time: cfg.wake_learn_pm||'17:30', nextTime: cfg.out_together||'18:30',  label:'Wake + Learn (PM)',      suppressed: mode==='lansdowne', doneKey:'ethan_pm_done' },
    { key:'out_together',   time: cfg.out_together||'18:30',  nextTime: cfg.wrap||'20:00',          label: mode==='lansdowne'?'Out — Dad + Ethan (Toronto)':'Out Together (Family)', suppressed: false, doneKey:null }
  ];

  var html = '<div class="schedule-timeline">';
  slots.forEach(function(s, i) {
    var cur = isCurrent(s.time, s.nextTime);
    var cls = 'schedule-chunk' + (cur?' current-chunk':'') + (s.suppressed?' suppressed':'');

function dailyPlanForChildBlock(plan, childId, blockId) {
  if (!plan) return [];
  var items = [];
  var ps = plan.play_start || {};
  var ot = plan.out_together || {};
  if (blockId === 'morning-move' || blockId === 'exploration') {
    if (ps.event_name) {
      var psDesc = [ps.event_cost, ps.drive_time, ps.venue_reason].filter(Boolean).join(' \u00b7 ');
      items.push({ title: ps.event_name, desc: psDesc });
    }
  }
  if (blockId === 'learning') {
    var slotAm = plan.wake_learn_am || {};
    var slotPm = plan.wake_learn_pm || {};
    var valAm = slotAm[childId];
    var valPm = slotPm[childId];
    if (valAm) {
      var dAm = slotAm.book ? 'Book: ' + slotAm.book : (slotAm.notes || slotAm.prompt || '');
      var arrAm = Array.isArray(valAm) ? valAm : [valAm];
      arrAm.forEach(function(title, idx) { items.push({ title: title, desc: dAm, picked: idx === 0 }); });
    }
    if (valPm) {
      var dPm = slotPm.book ? 'Book: ' + slotPm.book : (slotPm.notes || slotPm.prompt || '');
      var arrPm = Array.isArray(valPm) ? valPm : [valPm];
      arrPm.forEach(function(title, idx) { items.push({ title: title, desc: dPm, picked: idx === 0 }); });
    }
  }
  if (blockId === 'family') {
    if (ot.venue_name || ot.toronto_venue) {
      var otTitle = ot.venue_name || ot.toronto_venue;
      var otDesc = [ot.venue_reason, ot.drive_time, ot.event_cost].filter(Boolean).join(' \u00b7 ');
      items.push({ title: otTitle, desc: otDesc });
    }
  }
  return items;
}

function renderChildRhythm(child, showAll=false, pillarFocus=null, innerOnly=false) {
  const stage = currentStage(child.dob);
  const todayStr = new Date().toISOString().slice(0,10);
  const todayPlan = (appState.dailyPlans || {})[todayStr] || null;
  let html = '';
  if (!innerOnly) {
    html += `<div class="child-col-header">
      <div class="child-avatar ${child.avClass}">${child.avatar}</div>
      ${child.name} <span style="font-weight:400;font-size:0.82em;color:#666">${stage.label} · ${stage.subtitle}</span>
    </div>`;
  }

  RHYTHM_BLOCKS.forEach(block => {
    let acts = ACTIVITIES.filter(a =>
      a.block === block.id &&
      a.stages.includes(stage.id) &&
      (block.id !== 'morning-move' || a.location !== 'indoor' || child.id === 'elaina')
    );
    if (pillarFocus) {
      acts.sort((a, b) => (b.pillar === pillarFocus ? 1 : 0) - (a.pillar === pillarFocus ? 1 : 0));
    }
    // Date-seeded shuffle — deterministic within a day, rolls each new day
    const rerollKey = ((appState.todayPicks || {})[todayStr] || {});
    const childPicks = (rerollKey[child.id] || {})[block.id] || '';
    const seed = todayStr + child.id + block.id + stage.id + childPicks;
    acts = dateSeededShuffle(acts, seed);
    // Drop activities done 2+ times in last 7 days (cool-down)
    acts = acts.filter(a => recentlyDoneFromCheckins(child.id, a.id, 7) < 2);
    // Push high-combined-score activities to end so fresh ones surface first
    acts.sort((a, b) => combinedDoneScore(child.id, a.id) - combinedDoneScore(child.id, b.id));
    acts = acts.slice(0, 3);

    // Today's Lesson card for learning block
    const lessonCard = block.id === 'learning' ? getTodayLesson(child.id, stage.id, todayStr) : null;

    const planItems = dailyPlanForChildBlock(todayPlan, child.id, block.id);
    if (!acts.length && !planItems.length && !lessonCard) return;

    html += `<div class="rhythm-block">
      <div class="rhythm-header ${block.cls}">
        <span style="font-size:1.2em">${block.icon}</span>
        <span class="rhythm-title">${block.label}</span>
        <span class="rhythm-hint">${block.hint}</span>
        <button onclick="rerollPicks('${child.id}','${block.id}')" title="Refresh picks" style="margin-left:8px;font-size:0.72em;background:none;border:1px solid #ccc;border-radius:10px;padding:1px 7px;cursor:pointer;color:#888">&#8635;</button>
      </div>`;
    if (lessonCard) { html += renderLessonCard(lessonCard); }
    if (planItems.length) {
      html += `<div style="margin-bottom:8px"><div style="font-size:0.72em;font-weight:700;color:#0078d4;letter-spacing:.4px;margin-bottom:4px;text-transform:uppercase">Today's Plan</div>`;
      planItems.forEach((item, idx) => {
        const optBadge = planItems.length > 1
          ? `<span style="font-size:0.68em;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:5px;${item.picked !== false ? 'background:#0078d4;color:#fff' : 'background:#e2e8f0;color:#64748b'}">${item.picked !== false ? 'Suggested' : 'Option ' + (idx + 1)}</span>`
          : '';
        html += `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:7px 10px;margin-bottom:5px${item.picked === false ? ';opacity:0.6' : ''}">` +
          `<div style="font-weight:600;font-size:0.85em">${item.title}${optBadge}</div>` +
          (item.desc ? `<div style="font-size:0.78em;color:#666;font-style:italic;margin-top:2px">${item.desc}</div>` : '') +
          `</div>`;
      });
      html += `</div>`;
      if (acts.length) {
        html += `<div style="font-size:0.72em;font-weight:700;color:#888;letter-spacing:.4px;margin-bottom:4px;text-transform:uppercase">More Ideas</div>`;
      }
    }
    acts.forEach(a => { html += activityCard(a, child.id); });
    html += `</div>`;
  });

  return html;
}

// ── ACTIVITY FRESHNESS ────────────────────────────────────────────────────────

function isRecentlyDone(childId, actId, days) {
  const done = appState.completed[childId] && appState.completed[childId][actId];
  if (!done) return false;
  const diff = (Date.now() - new Date(done).getTime()) / 86400000;
  return diff < days;
}

function recentlyDoneFromCheckins(childId, actId, days) {
  if (!appState.checkins || !appState.checkins.length) return 0;
  const cutoff = Date.now() - days * 86400000;
  let count = 0;
  appState.checkins.forEach(function(ci) {
    const ciDate = ci.date || (ci.ts && ci.ts.slice(0,10));
    if (!ciDate) return;
    if (new Date(ciDate).getTime() < cutoff) return;
    // ciAutoSave activities[] format
    if (ci.activities) {
      ci.activities.forEach(function(act) {
        const matchId = act.id === actId;
        const matchChild = ci.child_id === childId || act.child === childId || act.child === 'family' || ci.child_id === 'family';
        if (matchId && matchChild) count++;
      });
    }
    // kids-checkin skill done[] array format
    if (ci.done && Array.isArray(ci.done) && ci.child_id === childId) {
      if (ci.done.includes(actId)) count++;
    }
  });
  return count;
}

function combinedDoneScore(childId, actId) {
  const tapScore = isRecentlyDone(childId, actId, 7) ? 1 : 0;
  const ciScore = recentlyDoneFromCheckins(childId, actId, 14) * 2;
  return tapScore + ciScore;
}

function dateSeededShuffle(arr, seedStr) {
  let hash = 0;
  for (let i = 0; i < seedStr.length; i++) {
    hash = ((hash << 5) - hash) + seedStr.charCodeAt(i);
    hash |= 0;
  }
  const result = arr.slice();
  for (let i = result.length - 1; i > 0; i--) {
    hash = ((hash << 5) - hash) + i;
    hash |= 0;
    const j = Math.abs(hash) % (i + 1);
    const tmp = result[i]; result[i] = result[j]; result[j] = tmp;
  }
  return result;
}

function rerollPicks(childId, blockId) {
  const today = new Date().toISOString().slice(0,10);
  if (!appState.todayPicks) appState.todayPicks = {};
  if (!appState.todayPicks[today]) appState.todayPicks[today] = {};
  if (!appState.todayPicks[today][childId]) appState.todayPicks[today][childId] = {};
  appState.todayPicks[today][childId][blockId] = Date.now().toString();
  saveState();
  renderRhythm();
}

function renderLibrary() {
  const childF = document.getElementById('flt-child').value;
  const pillarF = document.getElementById('flt-pillar').value;
  const locF = document.getElementById('flt-loc').value;
  const durF = document.getElementById('flt-dur').value;
  const search = (document.getElementById('flt-search').value || '').toLowerCase();

  const ethanStage  = currentStage(CHILDREN[0].dob);
  const elainaStage = currentStage(CHILDREN[1].dob);

  // Pick source array based on active stream
  const streamMap = { alpha: ACTIVITIES, character: CHARACTER_ACTIVITIES, academic: ACADEMIC_ACTIVITIES, finance: FINANCE_ACTIVITIES };
  const sourceActs = streamMap[_activeStream] || ACTIVITIES;

  // Update stream button counts
  const sb = document.getElementById('sb-' + _activeStream);
  if (sb) sb.textContent = (_activeStream.charAt(0).toUpperCase() + _activeStream.slice(1)) + ' (' + sourceActs.length + ')';

  const pillarGaps = computePillarGaps();
  const recencyMap = computeRecencyMap();

  let acts = sourceActs.filter(a => {
    if (pillarF !== 'all' && a.pillar !== pillarF) return false;
    if (locF !== 'all' && a.location !== locF) return false;
    if (durF !== 'all' && a.duration > parseInt(durF)) return false;
    if (search && !a.title.toLowerCase().includes(search) && !a.desc.toLowerCase().includes(search)) return false;
    if (childF !== 'all') {
      const stage = childF === 'ethan' ? ethanStage : elainaStage;
      if (!a.stages.includes(stage.id)) return false;
    }
    return true;
  });

  // Sort by adaptation score (most needed first)
  acts = acts.slice().sort((a, b) => adaptationScore(b, pillarGaps, recencyMap) - adaptationScore(a, pillarGaps, recencyMap));

  let html = '';

  if (childF !== 'all') {
    // Single child view — flat list with count
    html += `<div style="font-size:0.82em;color:#666;margin-bottom:10px">${acts.length} activities for ${childF === 'ethan' ? 'Ethan' : 'Elaina'}</div>`;
    if (!acts.length) html += `<div class="card-sm">No activities match your filters.</div>`;
    acts.forEach(a => { html += activityCard(a, childF, true); });
  } else {
    // "All" view — group by child with section headers
    const ethanActs  = acts.filter(a => a.stages.includes(ethanStage.id));
    const elainaActs = acts.filter(a => a.stages.includes(elainaStage.id));
    const total = new Set([...ethanActs.map(a=>a.id), ...elainaActs.map(a=>a.id)]).size;
    html += `<div style="font-size:0.82em;color:#666;margin-bottom:14px">${total} activities</div>`;

    // Ethan section
    html += `<div style="display:flex;align-items:center;gap:8px;margin:10px 0 8px">
      <div class="child-avatar ethan-av" style="width:24px;height:24px;font-size:0.72em">E</div>
      <span style="font-weight:700;font-size:0.9em">Ethan</span>
      <span style="font-size:0.78em;color:#666">${ethanStage.label} · ${ethanStage.subtitle}</span>
      <span style="font-size:0.75em;color:#888;margin-left:auto">${ethanActs.length} activities</span>
    </div>`;
    if (!ethanActs.length) html += `<div class="card-sm" style="margin-bottom:16px">No activities match your filters for Ethan.</div>`;
    ethanActs.forEach(a => { html += activityCard(a, 'ethan', true); });

    // Elaina section
    html += `<div style="display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding-top:10px;border-top:2px solid #e0e0e0">
      <div class="child-avatar elaina-av" style="width:24px;height:24px;font-size:0.72em">El</div>
      <span style="font-weight:700;font-size:0.9em">Elaina</span>
      <span style="font-size:0.78em;color:#666">${elainaStage.label} · ${elainaStage.subtitle}</span>
      <span style="font-size:0.75em;color:#888;margin-left:auto">${elainaActs.length} activities</span>
    </div>`;
    if (!elainaActs.length) html += `<div class="card-sm">No activities match your filters for Elaina.</div>`;
    elainaActs.forEach(a => { html += activityCard(a, 'elaina', true); });
  }

  document.getElementById('library-grid').innerHTML = html;
}

function exportHTML() {
  const stateJSON = JSON.stringify(appState, null, 2);
  const newPreseed = '/*PRESEED_START*/\nconst PRESEED = ' + stateJSON + ';\n/*PRESEED_END*/';
  const doDownload = (source) => {
    const updated = source.replace(/\/\*PRESEED_START\*\/[\s\S]*?\/\*PRESEED_END\*\//, newPreseed);
    const blob = new Blob([updated], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'alpha-home-edu-' + new Date().toISOString().slice(0,10) + '.html';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Snapshot exported — open the downloaded file to continue');
  };
  fetch(location.href)
    .then(r => r.text())
    .then(source => {
      if (source.includes('PRESEED_START')) { doDownload(source); }
      else throw new Error('no PRESEED');
    })
    .catch(() => {
      // Fallback: capture from document source
      const src = document.documentElement.outerHTML;
      doDownload(src);
    });
}

function runHistorySearch() {
  const q = (document.getElementById('hs-text').value || '').toLowerCase();
  const childF = document.getElementById('hs-child').value;
  const from = document.getElementById('hs-from').value;
  const to = document.getElementById('hs-to').value;
  const results = [];
  (appState.checkins || []).forEach(ci => {
    if (ci.date < from || ci.date > to) return;
    if (childF !== 'all' && ci.child_id !== childF) return;
    const text = JSON.stringify(ci).toLowerCase();
    if (!q || text.includes(q)) results.push({ source: 'Check-in', date: ci.date, child: ci.child_id, text: ci.openAnswer || Object.values(ci.notes||{}).join(' ') || '(check-in logged)' });
  });
  (appState.comments || []).forEach(c => {
    if (c.ts.slice(0,10) < from || c.ts.slice(0,10) > to) return;
    if (childF !== 'all' && c.child_id && c.child_id !== childF) return;
    if (!q || c.raw_text.toLowerCase().includes(q)) results.push({ source: 'Comment', date: c.ts.slice(0,10), child: c.child_id || '', text: c.raw_text });
  });
  (appState.journal || []).forEach(e => {
    if (e.date < from || e.date > to) return;
    if (childF !== 'all' && e.childId !== childF) return;
    if (!q || e.text.toLowerCase().includes(q)) results.push({ source: 'Journal', date: e.date, child: e.childId, text: e.text });
  });
  results.sort((a,b) => b.date.localeCompare(a.date));
  let html = `<div style="font-size:0.78em;color:#888;margin-bottom:8px">${results.length} result${results.length!==1?'s':''}</div>`;
  if (!results.length) { html += `<div class="card-sm" style="color:#888">No results found.</div>`; }
  results.forEach(r => {
    const hi = q ? r.text.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>') : r.text;
    html += `<div class="search-result">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
        <span class="result-source">${r.source}</span>
        <span style="font-size:0.75em;color:#aaa">${r.date}</span>
        ${r.child ? `<span style="font-size:0.75em;color:#666">${r.child}</span>` : ''}
      </div>
      <div class="result-text">${hi}</div>
    </div>`;
  });
  document.getElementById('hs-results').innerHTML = html;
}

// ── ADAPTATION ENGINE (Phase 2) ───────────────────────────────────────────────

function computePillarGaps() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const counts = { teamwork: 0, storytelling: 0, entrepreneurship: 0, relationships: 0, grit: 0 };
  const allActs = [...ACTIVITIES, ...CHARACTER_ACTIVITIES, ...ACADEMIC_ACTIVITIES, ...FINANCE_ACTIVITIES];
  (appState.checkins || []).forEach(c => {
    if ((c.date || '') < cutoffStr) return;
    (c.done || []).forEach(id => {
      const act = allActs.find(a => a.id === id);
      if (act && counts[act.pillar] !== undefined) counts[act.pillar]++;
    });
    (c.spontaneous || []).forEach(s => {
      if (s.pillar && counts[s.pillar] !== undefined) counts[s.pillar]++;
    });
  });
  const total = Object.values(counts).reduce((a, b) => a + b, 0) || 1;
  return Object.entries(counts)
    .map(([pillar, n]) => ({ pillar, n, pct: Math.round(n / total * 100) }))
    .sort((a, b) => a.n - b.n);
}

function computeRecencyMap() {
  const map = {};
  ['ethan', 'elaina'].forEach(child => {
    const comp = (appState.completed && appState.completed[child]) || {};
    Object.entries(comp).forEach(([id, data]) => {
      const d = typeof data === 'object' ? (data.date || data.ts || '') : '';
      if (!map[id] || d > map[id]) map[id] = d;
    });
  });
  (appState.checkins || []).forEach(c => {
    (c.done || []).forEach(id => {
      if (!map[id] || (c.date || '') > map[id]) map[id] = c.date || '';
    });
  });
  return map;
}

function computeVenueRotationGaps() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  const counts = {};
  (appState.checkins || []).forEach(function(c) {
    if ((c.date || '') < cutoffStr) return;
    (c.spontaneous || []).forEach(function(s) {
      if (!s.title) return;
      const key = s.title.trim().toLowerCase();
      counts[key] = (counts[key] || 0) + 1;
    });
  });
  return Object.entries(counts)
    .filter(function(e) { return e[1] >= 3; })
    .sort(function(a, b) { return b[1] - a[1]; })
    .map(function(e) { return { venue: e[0], n: e[1] }; });
}

function adaptationScore(act, pillarGaps, recencyMap) {
  let score = 0;
  const gapRank = pillarGaps.findIndex(g => g.pillar === act.pillar);
  if (gapRank === 0) score += 10;
  else if (gapRank === 1) score += 6;
  else if (gapRank === 2) score += 3;
  const lastDone = recencyMap[act.id];
  if (!lastDone) score += 5;
  else {
    const daysAgo = Math.round((Date.now() - new Date(lastDone).getTime()) / 86400000);
    if (daysAgo >= 14) score += 4;
    else if (daysAgo >= 7) score += 2;
    else score -= 3;
  }
  return score;
}

(function() {
  var ms = appState.milestones || {};
  if (appState._ms_migrated_v1) return;
  var changed = false;
  var newMs = {};
  Object.keys(ms).forEach(function(key) {
    // key format: "ethan_ms001" or "elaina_ms001"
    var parts = key.split('_');
    var oldId = parts[parts.length - 1];
    var newId = MILESTONE_ID_MIGRATION[oldId];
    if (newId) {
      var newKey = parts.slice(0, parts.length - 1).join('_') + '_' + newId;
      newMs[newKey] = ms[key];
      changed = true;
    } else {
      newMs[key] = ms[key];
    }
  });
  if (changed) {
    appState.milestones = newMs;
    appState._ms_migrated_v1 = true;
    try { localStorage.setItem('alpha-home-edu', JSON.stringify(appState)); } catch(e) {}

  var plan = (appState.dailyPlans || {})[today] || {};
  _ciActivities = []; _ciRatings = {};
  _ciSpontCount = 0;
  _ciPickerChild = 'ethan';

  // Look up today's draft for this parent
  var existing = (appState.checkins || []).find(function(e) {
    return e.date === today && e.parent === _ciParent && e.summary_pending;
  }) || null;

  // Restore reflection questions from draft (prevents rotation on re-render mid-day)
  var dayOffset = Math.floor(Date.now() / 86400000);
  if (existing && existing.reflections && existing.reflections.length === 3) {
    _ciRefQ = existing.reflections.map(function(r) { return r.question; });
  } else {
    _ciRefQ = [
      CI_QUESTIONS[dayOffset % 10],
      CI_QUESTIONS[10 + (dayOffset % 10)],
      CI_QUESTIONS[20 + (dayOffset % 10)]
    ];
  }

  // Build activity list: prefer existing draft over daily plan
  var wam = plan.wake_learn_am || {};
  var wpm = plan.wake_learn_pm || {};
  var ps = plan.play_start || {};
  var ot = plan.out_together || {};
  var wamDesc = wam.book ? 'Book: ' + wam.book : (wam.notes || wam.prompt || '');
  var wpmDesc = wpm.book ? 'Book: ' + wpm.book : (wpm.notes || wpm.prompt || '');
  var psDesc = [ps.event_cost, ps.drive_time, ps.venue_reason].filter(Boolean).join(' \u00b7 ');
  var otDesc = [ot.venue_reason, ot.drive_time, ot.event_cost].filter(Boolean).join(' \u00b7 ');
  function slotDesc(slot) {
    if (slot === 'wake_learn_am') return wamDesc;
    if (slot === 'wake_learn_pm') return wpmDesc;
    if (slot === 'play_start') return psDesc;
    if (slot === 'out_together') return otDesc;
    return '';
  }
  var initActs = [];
  // Push one or more activities from a slot value (handles arrays for multi-pick)
  function pushSlotActs(val, slotName, label, childKey, desc) {
    if (!val) return;
    var arr = Array.isArray(val) ? val : [val];
    var slotKey = slotName + ':' + childKey;
    arr.forEach(function(title, idx) {
      initActs.push({ title: title, slot: slotName, label: label, child: childKey, desc: desc, slotKey: slotKey, selected: idx === 0 });
    });
  }
  pushSlotActs(wam.ethan, 'wake_learn_am', 'AM Learning', 'ethan', wamDesc);
  pushSlotActs(wam.elaina, 'wake_learn_am', 'AM Learning', 'elaina', wamDesc);
  pushSlotActs(wpm.ethan, 'wake_learn_pm', 'PM Learning', 'ethan', wpmDesc);
  pushSlotActs(wpm.elaina, 'wake_learn_pm', 'PM Learning', 'elaina', wpmDesc);
  if (ps.event_name) initActs.push({ title: ps.event_name, slot: 'play_start', label: 'Outing', child: 'family', desc: psDesc, slotKey: 'play_start:family', selected: true });
  if (ot.venue_name || ot.toronto_venue) initActs.push({ title: ot.venue_name || ot.toronto_venue, slot: 'out_together', label: 'Evening', child: 'family', desc: otDesc, slotKey: 'out_together:family', selected: true });

  // If draft exists: override selected state from saved title, add library items
  if (existing && existing.activities && existing.activities.length) {
    existing.activities.forEach(function(saved) {
      if (saved.slot === 'manual') {
        var libIdx = initActs.length;
        initActs.push({ title: saved.title, slot: 'manual', label: slotLabel('manual'), fromLibrary: true, child: saved.child || 'ethan', desc: '', slotKey: 'manual:' + libIdx, selected: true });
        if (saved.rating) _ciRatings[libIdx] = saved.rating;
      } else {
        var slotKey = saved.slot + ':' + (saved.child || slotChild(saved.slot));
        var siblings = initActs.filter(function(a) { return a.slotKey === slotKey; });
        if (siblings.length > 1) {
          siblings.forEach(function(a) { a.selected = (a.title === saved.title); });
        }
        var savedIdx = initActs.findIndex(function(a) { return a.slotKey === slotKey && a.title === saved.title; });
        if (savedIdx >= 0 && saved.rating) _ciRatings[savedIdx] = saved.rating;
      }
    });
  }

  var slotKeyCounts = {};
  initActs.forEach(function(a) { if (a.slotKey) slotKeyCounts[a.slotKey] = (slotKeyCounts[a.slotKey] || 0) + 1; });

  function actRow(act, i) {
    var hasSiblings = act.slotKey && (slotKeyCounts[act.slotKey] || 0) > 1;
    var isUnpicked = hasSiblings && act.selected === false;
    return '<div class="ci-activity' + (isUnpicked ? ' unpicked' : '') + '" id="ci-act-' + i + '">' +
      '<div class="ci-act-header">' +
      '<span class="ci-act-label">' + act.label + '</span>' +
      '<span class="ci-act-title">' + act.title + '</span>' +
      (hasSiblings ? '<button class="ci-pick-btn' + (act.selected !== false ? ' picked' : '') + '" onclick="ciPickActivity(' + i + ')">' + (act.selected !== false ? 'Picked \u2713' : 'Pick') + '</button>' : '') +
      '<label class="ci-done-check"><input type="checkbox" id="ci-done-' + i + '" ' + (isUnpicked ? '' : 'checked') + '> Did it</label>' +
      (act.fromLibrary ? '<button class="ci-spont-del" onclick="ciRemoveActivity(' + i + ')">x</button>' : '') +
      '</div>' +
      (act.desc ? '<div class="ci-act-desc">' + act.desc + '</div>' : '') +
      '<div class="ci-rating-row">Rating: ' +
      [1,2,3,4,5].map(function(r) { return '<button class="ci-star" id="ci-star-' + i + '-' + r + '" onclick="ciSetRating(' + i + ',' + r + ')">' + r + '</button>'; }).join('') +
      '</div>' +
      '<textarea class="ci-notes" id="ci-notes-' + i + '" placeholder="What happened? How did he respond?"></textarea>' +
      '</div>';
  }

  var actsByChild = { ethan: '', elaina: '', family: '' };
  initActs.forEach(function(act, i) { _ciActivities.push(act); actsByChild[act.child || 'ethan'] += actRow(act, i); });

  var childDefs = [
    { key: 'ethan',  label: 'Ethan',  avClass: 'ethan-av',  avText: 'E'   },
    { key: 'elaina', label: 'Elaina', avClass: 'elaina-av', avText: 'El'  },
    { key: 'family', label: 'Family', avClass: 'family-av', avText: 'Fam' }
  ];

  var actualToday = new Date().toISOString().slice(0,10);
  var minDate = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
  var h = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">' +
    '<h2 style="margin:0;font-size:18px">Check-in</h2>' +
    '<input type="date" id="ci-date-picker" value="' + today + '" min="' + minDate + '" max="' + actualToday + '"' +
    ' onchange="ciSetDate(this.value)" style="font-size:13px;padding:3px 7px;border:1.5px solid #cbd5e1;border-radius:6px;cursor:pointer">' +
    '</div>';
  if (today !== actualToday) {
    var d = new Date(today + 'T12:00:00');
    var fmt = d.toLocaleDateString('en-CA', {month:'short',day:'numeric'});
    h += '<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#92400e">' +
      'Back-filling <strong>' + fmt + '</strong> — auto-save active. Plan data may be empty for past dates.' +
      '</div>';
  }

  h += '<div class="ci-section"><label style="font-size:13px;font-weight:600">Who is submitting?</label><div class="ci-parent-btns"><button class="ci-parent-btn' + (_ciParent === 'john' ? ' active' : '') + '" id="ci-john" onclick="ciSetParent(\'john\')">John</button><button class="ci-parent-btn' + (_ciParent === 'tiffany' ? ' active' : '') + '" id="ci-tiffany" onclick="ciSetParent(\'tiffany\')">Tiffany</button></div></div>';

  h += '<div class="ci-section"><h3>Today\'s Activities (Q1)</h3>';
  childDefs.forEach(function(cd) {
    h += '<div class="ci-child-section">';
    h += '<div class="ci-child-header"><div class="child-avatar ' + cd.avClass + '">' + cd.avText + '</div>' + cd.label + '</div>';
    h += '<div id="ci-acts-list-' + cd.key + '">';
    if (actsByChild[cd.key]) {
      h += actsByChild[cd.key];
    } else {
      h += '<p class="ci-empty" id="ci-acts-empty-' + cd.key + '" style="font-size:12px;color:#aaa;margin:4px 0 8px">(none planned — add from library)</p>';
    }
    h += '</div></div>';
  });
  h += '<button class="ci-add-btn" onclick="ciTogglePicker()" style="margin-top:8px">+ Add activity from library</button>';
  h += '<div id="ci-picker" style="display:none;margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px">';
  h += '<div style="margin-bottom:8px"><span style="font-size:12px;color:#666;font-weight:600">For who?</span>';
  h += '<div class="ci-parent-btns" style="margin-top:4px">';
  h += '<button class="ci-parent-btn active" id="ci-picker-child-ethan" onclick="ciSetPickerChild(\'ethan\')">Ethan</button>';
  h += '<button class="ci-parent-btn" id="ci-picker-child-elaina" onclick="ciSetPickerChild(\'elaina\')">Elaina</button>';
  h += '<button class="ci-parent-btn" id="ci-picker-child-family" onclick="ciSetPickerChild(\'family\')">Family</button>';
  h += '</div></div>';
  h += '<input id="ci-picker-search" type="text" placeholder="Search 138 activities..." class="ci-picker-input" oninput="ciFilterPicker(this.value)">';
  h += '<div id="ci-picker-list" style="max-height:200px;overflow-y:auto;margin-top:8px"></div>';
  h += '<button class="ci-spont-del" onclick="ciClosePicker()" style="margin-top:6px">Close</button>';
  h += '</div></div>';

  h += '<div class="ci-section"><h3>Spontaneous Activities (Q2)</h3><div id="ci-spontaneous"></div><button class="ci-add-btn" onclick="ciAddSpontaneous()">+ Add spontaneous activity</button></div>';

  h += '<div class="ci-section"><h3>Reflection (Q3)</h3>';
  _ciRefQ.forEach(function(q, qi) {
    h += '<div style="margin-bottom:10px"><p style="font-size:13px;color:#555;margin:0 0 4px;font-style:italic">' + q + '</p>';
    h += '<textarea class="ci-tomorrow" id="ci-ref-answer-' + qi + '" placeholder="Your answer..."></textarea></div>';
  });
  h += '</div>';

  h += '<div class="ci-section"><h3>Tomorrow\'s Outlook (Q4)</h3><textarea class="ci-tomorrow" id="ci-tomorrow" placeholder="Anything to flag or change for tomorrow..."></textarea></div>';

  h += '<div class="ci-section" style="text-align:center;padding:8px 0"><div class="ci-status" id="ci-status" style="font-size:12px;color:#888">Auto-saves as you type. Nightly summary at 11:45 PM.</div></div>';
  panel.innerHTML = h;

  panel.addEventListener('input', ciScheduleSave);
  panel.addEventListener('change', ciScheduleSave);

  // Restore draft values into newly-built DOM
  if (existing) {
    setTimeout(function() {
      // Match by slot+child+title (not by index) since initActs is now always built from plan
      (existing.activities || []).forEach(function(saved) {
        _ciActivities.forEach(function(act, i) {
          if (!act) return;
          if (act.slot !== saved.slot) return;
          if ((act.child || slotChild(act.slot)) !== (saved.child || slotChild(saved.slot))) return;
          if (act.title !== saved.title) return;
          var dEl = document.getElementById('ci-done-' + i);
          if (dEl && saved.done === false) dEl.checked = false;
          if (saved.rating) {
            _ciRatings[i] = saved.rating;
            for (var r = 1; r <= 5; r++) {
              var b = document.getElementById('ci-star-' + i + '-' + r);
              if (b) b.className = 'ci-star' + (r <= saved.rating ? ' active' : '');
            }
          }
          var nEl = document.getElementById('ci-notes-' + i);
          if (nEl && saved.notes) nEl.value = saved.notes;
        });
      });
      (existing.spontaneous || []).forEach(function(spont) {
        var idx = _ciSpontCount;
        ciAddSpontaneous();
        var tEl = document.getElementById('ci-spont-title-' + idx);
        var cEl = document.getElementById('ci-spont-child-' + idx);
        var pEl = document.getElementById('ci-spont-pillar-' + idx);
        var dEl = document.getElementById('ci-spont-duration-' + idx);
        if (tEl) tEl.value = spont.title || '';
        if (cEl) cEl.value = spont.child || 'ethan';
        if (pEl) pEl.value = spont.pillar || 'other';
        if (dEl && spont.duration) dEl.value = spont.duration;
      });
      (existing.reflections || []).forEach(function(ref, qi) {
        var aEl = document.getElementById('ci-ref-answer-' + qi);
        if (aEl && ref.answer) aEl.value = ref.answer;
      });
      var tEl = document.getElementById('ci-tomorrow');
      if (tEl && existing.tomorrow_notes) tEl.value = existing.tomorrow_notes;
      var sEl = document.getElementById('ci-status');
      if (sEl) {
        var ts = existing.ts ? existing.ts.slice(11, 16) : '';
        sEl.innerHTML = '<span style="color:#888;font-size:12px">Draft restored' + (ts ? ' (last saved ' + ts + ')' : '') + '</span>';
      }
    }, 0);
  }

  // WhatsApp comment pre-fill (runs always, after DOM is built)
  setTimeout(function() {
    var ciToday = new Date().toISOString().slice(0, 10);
    var todayComments = (appState.comments || []).filter(function(c) { return c.date === ciToday; });
    if (!todayComments.length) return;
    todayComments.forEach(function(c) {
      var rawText = c.raw_text || c.text || '';
      var rating = (c.parsed && c.parsed.rating) ? c.parsed.rating : null;
      if (!rawText) return;
      var parentName = c.parent ? (c.parent.charAt(0).toUpperCase() + c.parent.slice(1)) : 'Tiffany';
      var rawLower = rawText.toLowerCase();
      _ciActivities.forEach(function(act, i) {
        if (!act || act.selected === false) return;
        if (rawLower.indexOf(act.title.toLowerCase()) === -1) return;
        var div = document.getElementById('ci-act-' + i);
        if (!div) return;
        div.classList.add('ci-from-whatsapp');
        var header = div.querySelector('.ci-act-header');
        if (header && !header.querySelector('.ci-wa-badge')) {
          var badge = document.createElement('span');
          badge.className = 'ci-wa-badge'; badge.textContent = 'from WhatsApp';
          header.appendChild(badge);
        }
        if (rating && !_ciRatings[i]) {
          _ciRatings[i] = rating;
          for (var r = 1; r <= 5; r++) {
            var b = document.getElementById('ci-star-' + i + '-' + r);
            if (b) b.className = 'ci-star' + (r <= rating ? ' active' : '');
          }
        }
        var nEl = document.getElementById('ci-notes-' + i);
        if (nEl) {
          var prefix = parentName + ': ' + rawText;
          if (nEl.value.indexOf(prefix) === -1) {
            nEl.value = nEl.value ? nEl.value + '\n' + prefix : prefix;
          }
        }
      });
    });
  }, 0);
}

function ciAddActivityRow(act, i) {
  var child = act.child || _ciPickerChild || 'ethan';
  if (!['ethan','elaina','family'].includes(child)) child = 'ethan';
  var container = document.getElementById('ci-acts-list-' + child);
  if (!container) { child = 'ethan'; container = document.getElementById('ci-acts-list-ethan'); }
  var empty = document.getElementById('ci-acts-empty-' + child);
  if (empty) empty.style.display = 'none';
  var div = document.createElement('div');
  div.className = 'ci-activity'; div.id = 'ci-act-' + i;
  div.innerHTML = '<div class="ci-act-header">' +
    '<span class="ci-act-label">' + act.label + '</span>' +
    '<span class="ci-act-title">' + act.title + '</span>' +
    '<label class="ci-done-check"><input type="checkbox" id="ci-done-' + i + '" checked> Did it</label>' +
    '<button class="ci-spont-del" onclick="ciRemoveActivity(' + i + ')">x</button>' +
    '</div>' +
    (act.desc ? '<div class="ci-act-desc">' + act.desc + '</div>' : '') +
    '<div class="ci-rating-row">Rating: ' +
    [1,2,3,4,5].map(function(r) { return '<button class="ci-star" id="ci-star-' + i + '-' + r + '" onclick="ciSetRating(' + i + ',' + r + ')">' + r + '</button>'; }).join('') +
    '</div>' +
    '<textarea class="ci-notes" id="ci-notes-' + i + '" placeholder="What happened? How did he respond?"></textarea>';
  if (container) container.appendChild(div);
}

function ciRemoveActivity(i) {
  var div = document.getElementById('ci-act-' + i);
  if (div) div.remove();
  _ciActivities[i] = null;
  ['ethan','elaina','family'].forEach(function(c) {
    var container = document.getElementById('ci-acts-list-' + c);
    if (container && !container.querySelector('.ci-activity')) {
      var empty = document.getElementById('ci-acts-empty-' + c);
      if (empty) empty.style.display = '';
    }
  });
  ciScheduleSave();
}

function ciTogglePicker() {
  var picker = document.getElementById('ci-picker');
  if (!picker) return;
  if (picker.style.display === 'none' || !picker.style.display) {
    picker.style.display = 'block';
    var s = document.getElementById('ci-picker-search'); if (s) { s.focus(); s.value = ''; }
    ciFilterPicker('');
  } else {
    picker.style.display = 'none';
  }
}

function ciClosePicker() {
  var picker = document.getElementById('ci-picker');
  if (picker) picker.style.display = 'none';
}

function ciFilterPicker(q) {
  q = (q || '').toLowerCase();
  var allActs = (typeof ACTIVITIES !== 'undefined' ? ACTIVITIES : []);
  var filtered = allActs.filter(function(a) {
    if (!q) return true;
    return (a.title || '').toLowerCase().indexOf(q) >= 0 || (a.desc || '').toLowerCase().indexOf(q) >= 0;
  }).slice(0, 25);
  var list = document.getElementById('ci-picker-list');
  if (!list) return;
  if (!filtered.length) { list.innerHTML = '<div style="padding:8px;color:#888;font-size:13px">No results</div>'; return; }
  list.innerHTML = filtered.map(function(a) {
    var pill = a.pillar ? ' <span style="font-size:10px;color:#1a56db;background:#e8f0fe;padding:1px 5px;border-radius:3px">' + a.pillar + '</span>' : '';
    var safeTitle = a.title.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<div class="ci-picker-item" onclick="ciPickActivity(\'' + safeTitle + '\')">' +
      '<span style="font-size:13px;font-weight:600">' + a.title + '</span>' + pill + '</div>';
  }).join('');
}

function ciPickActivity(title) {
  var i = _ciActivities.length;
  var act = { title: title, slot: 'manual', label: 'Added', fromLibrary: true, child: _ciPickerChild || 'ethan' };
  _ciActivities.push(act);
  ciAddActivityRow(act, i);
  ciClosePicker();
  ciScheduleSave();
}
function ciSetPickerChild(child) {
  _ciPickerChild = child;
  ['ethan','elaina','family'].forEach(function(c) {
    var btn = document.getElementById('ci-picker-child-' + c);
    if (btn) btn.className = 'ci-parent-btn' + (c === child ? ' active' : '');
  });
}

function ciSetParent(p) {
  if (p === _ciParent) return;
  clearTimeout(_ciSaveTimer); _ciSaveTimer = null;
  ciAutoSave();
  _ciParent = p;
  renderCheckin();
}
function ciSetRating(idx, rating) {
  _ciRatings[idx] = rating;
  for (var r = 1; r <= 5; r++) { var b = document.getElementById('ci-star-' + idx + '-' + r); if (b) b.className = 'ci-star' + (r <= rating ? ' active' : ''); }
  ciScheduleSave();
}
function ciAddSpontaneous() {
  var i = _ciSpontCount++;
  var div = document.createElement('div'); div.className = 'ci-spont-row'; div.id = 'ci-spont-' + i;
  div.innerHTML = '<input type="text" class="ci-spont-title" id="ci-spont-title-' + i + '" placeholder="Activity name">' +
    '<select class="ci-spont-child" id="ci-spont-child-' + i + '"><option value="ethan">Ethan</option><option value="elaina">Elaina</option><option value="family">Family</option></select>' +
    '<select class="ci-spont-pillar" id="ci-spont-pillar-' + i + '"><option value="teamwork">Teamwork</option><option value="storytelling">Storytelling</option><option value="entrepreneurship">Entrepreneurship</option><option value="relationships">Relationships</option><option value="grit">Grit</option><option value="other">Other</option></select>' +
    '<input type="number" class="ci-spont-duration" id="ci-spont-duration-' + i + '" placeholder="Min" min="1" max="120">' +
    '<button class="ci-spont-del" onclick="document.getElementById(\'ci-spont-' + i + '\').remove();ciScheduleSave()">x</button>';
  document.getElementById('ci-spontaneous').appendChild(div);
  ciScheduleSave();
}
function ciSetDate(dateVal) {
  var actualToday = new Date().toISOString().slice(0,10);
  if (!dateVal || dateVal > actualToday) return;
  if (_ciSaveTimer) { clearTimeout(_ciSaveTimer); _ciSaveTimer = null; ciAutoSave(); }
  _ciSelectedDate = dateVal;
  renderCheckin();
}

function ciAutoSave() {
  var today = _ciSelectedDate;
  var activities = _ciActivities.map(function(act, i) {
    if (!act) return null;
    if (act.selected === false) return null; // skip unpicked siblings
    var dEl = document.getElementById('ci-done-' + i); var nEl = document.getElementById('ci-notes-' + i);
    return { title: act.title, slot: act.slot, child: act.child || slotChild(act.slot), done: dEl ? dEl.checked : false, rating: _ciRatings[i] || null, notes: nEl ? nEl.value.trim() : '' };
  }).filter(Boolean);
  var spontaneous = [];
  document.querySelectorAll('.ci-spont-row').forEach(function(row) {
    var id = row.id.replace('ci-spont-', '');
    var tEl = document.getElementById('ci-spont-title-' + id); var cEl = document.getElementById('ci-spont-child-' + id); var pEl = document.getElementById('ci-spont-pillar-' + id); var dEl = document.getElementById('ci-spont-duration-' + id);
    var title = tEl ? tEl.value.trim() : '';
    if (title) spontaneous.push({ title: title, child: cEl ? cEl.value : 'ethan', pillar: pEl ? pEl.value : 'other', duration: parseInt(dEl ? dEl.value : '0') || 0 });
  });
  var reflections = _ciRefQ.map(function(q, qi) {
    var a = document.getElementById('ci-ref-answer-' + qi);
    return { question: q, answer: a ? a.value.trim() : '' };
  });
  var tEl = document.getElementById('ci-tomorrow');
  var tomorrow_notes = tEl ? tEl.value.trim() : '';

  var hasContent = activities.some(function(a) { return a.rating || (a.notes && a.notes.length); })
    || spontaneous.length
    || reflections.some(function(r) { return r.answer && r.answer.length; })
    || tomorrow_notes.length;
  if (!hasContent) return;

  if (!appState.checkins) appState.checkins = [];
  var idx = -1;
  for (var i = 0; i < appState.checkins.length; i++) {
    var e = appState.checkins[i];
    if (e.date === today && e.parent === _ciParent && e.summary_pending) { idx = i; break; }
  }
  var entry = {
    date: today, ts: new Date().toISOString(), parent: _ciParent,
    activities: activities, spontaneous: spontaneous,
    reflections: reflections, tomorrow_notes: tomorrow_notes,
    summary_pending: true
  };
  if (idx >= 0) appState.checkins[idx] = entry; else appState.checkins.push(entry);
  saveState();

  var s = document.getElementById('ci-status');
  if (s) {
    var t = new Date();
    var hh = String(t.getHours()).padStart(2, '0');
    var mm = String(t.getMinutes()).padStart(2, '0');
    s.innerHTML = '<span style="color:#888;font-size:12px">Auto-saved ' + hh + ':' + mm + '</span>';
  }
}
</script>
</body>
</html>
