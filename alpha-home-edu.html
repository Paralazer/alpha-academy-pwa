<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alpha Academy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alpha">
<meta name="theme-color" content="#3b5b8a">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 980px; margin: 0 auto; padding: 16px; background: #fafafa; color: #222; }
h1 { font-size: 1.6em; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 0.85em; margin-bottom: 20px; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid #e0e0e0; padding-bottom: 0; }
.tab-btn { padding: 8px 14px; border: none; background: none; cursor: pointer; font-size: 0.85em; font-weight: 500; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 6px 6px 0 0; transition: all 0.15s; }
.tab-btn:hover { color: #1a73e8; background: #f0f4ff; }
.tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; background: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Summary chips */
.summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.chip { background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; padding: 6px 14px; font-size: 0.82em; display: flex; align-items: center; gap: 6px; }
.chip .icon { font-size: 1.1em; }
.chip.highlight { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; font-weight: 600; }

/* Cards */
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
.card-sm { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }

/* Pillar colors */
.p-teamwork { --pc: #3b82f6; }
.p-storytelling { --pc: #8b5cf6; }
.p-entrepreneurship { --pc: #22c55e; }
.p-relationships { --pc: #ef4444; }
.p-grit { --pc: #f59e0b; }

.pillar-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.68em; font-weight: 700; color: #fff; background: var(--pc, #888); vertical-align: middle; }
.pillar-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--pc, #888); vertical-align: middle; margin-right: 4px; }

.duration-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 0.68em; background: #f1f5f9; color: #64748b; font-weight: 600; }
.location-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 0.68em; background: #f0fdf4; color: #166534; font-weight: 500; }
.location-badge.indoor { background: #fef3c7; color: #92400e; }
.location-badge.either { background: #f5f3ff; color: #4c1d95; }
.age-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 0.68em; background: #f0f4ff; color: #1e40af; font-weight: 500; }

/* Activity card */
.activity-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.activity-card:hover { border-color: #c7d2fe; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.activity-title { font-weight: 600; font-size: 0.9em; margin-bottom: 4px; }
.activity-desc { font-size: 0.78em; color: #555; margin: 4px 0; line-height: 1.5; }
.activity-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
.activity-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.fv-note { font-size: 0.72em; color: #888; font-style: italic; margin-top: 4px; }
.materials { font-size: 0.74em; color: #666; margin-top: 3px; }
.done-btn { padding: 3px 10px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; cursor: pointer; font-size: 0.75em; color: #555; }
.done-btn.done { background: #dcfce7; border-color: #86efac; color: #166534; }

/* Rhythm blocks */
.rhythm-block { margin-bottom: 20px; }
.rhythm-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; }
.rhythm-morning { background: #fef3c7; }
.rhythm-learning { background: #e0e7ff; }
.rhythm-exploration { background: #dcfce7; }
.rhythm-family { background: #fee2e2; }
.rhythm-title { font-weight: 700; font-size: 0.9em; }
.rhythm-hint { font-size: 0.76em; color: #666; margin-left: auto; }

/* Two-col layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
.child-col-header { font-weight: 700; font-size: 1em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e0e0e0; display: flex; align-items: center; gap: 8px; }
.child-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8em; color: #fff; }
.ethan-av { background: #3b82f6; }
.elaina-av { background: #ec4899; }
.family-av { background: #6b7280; }
.ci-child-section { margin-bottom: 14px; }
.ci-child-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #374151; padding: 6px 0 4px; border-bottom: 1px solid #f3f4f6; margin-bottom: 6px; }

/* Grandparent mode notice */
.gp-notice { background: #fffbf0; border: 1px solid #f4b942; border-radius: 10px; padding: 12px 16px; font-size: 0.84em; color: #78350f; margin-bottom: 14px; }

/* Day Mode toggle */
.day-mode-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.day-mode-label { font-size: 0.78em; color: #666; font-weight: 600; margin-right: 4px; }
.day-mode-btn { padding: 5px 16px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: #fff; cursor: pointer; font-size: 0.8em; font-weight: 500; color: #555; transition: all 0.15s; }
.day-mode-btn.active-home { background: #e0f2fe; border-color: #0ea5e9; color: #0369a1; }
.day-mode-btn.active-lansdowne { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.day-mode-btn.active-skip { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
.day-mode-btn.active-richmondhill { background: #f0fdf4; border-color: #22c55e; color: #15803d; }

/* 5-chunk daily timeline */
.schedule-timeline { margin-bottom: 20px; }
.schedule-chunk { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; align-items: flex-start; }
.schedule-chunk:last-child { border-bottom: none; }
.schedule-chunk.current-chunk { background: #f0f7ff; border-radius: 8px; padding: 10px 10px; margin: 0 -10px; border-bottom: none; border-left: 3px solid #1a73e8; }
.schedule-chunk.suppressed { opacity: 0.38; }
.chunk-time { min-width: 52px; font-weight: 700; font-size: 0.82em; color: #555; padding-top: 2px; }
.chunk-body { flex: 1; }
.chunk-title { font-weight: 700; font-size: 0.9em; margin-bottom: 3px; }
.chunk-detail { font-size: 0.8em; color: #555; line-height: 1.5; }
.chunk-cal-btn { display: inline-block; background: #1a73e8; color: #fff; padding: 3px 11px; border-radius: 14px; text-decoration: none; font-size: 0.74em; font-weight: 500; margin-top: 4px; }
.chunk-done-btn { padding: 3px 11px; border-radius: 14px; border: 1.5px solid #e0e0e0; background: #fafafa; cursor: pointer; font-size: 0.74em; color: #555; margin-top: 4px; }
.chunk-done-btn.done { background: #dcfce7; border-color: #86efac; color: #166534; }

/* Stage accordion */
.stage-item { border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.stage-header { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: #fff; user-select: none; }
.stage-header:hover { background: #f8fafc; }
.stage-header.current { background: #e0e7ff; border-left: 4px solid #4f46e5; }
.stage-body { display: none; padding: 14px 16px; border-top: 1px solid #f0f0f0; background: #fafafa; }
.stage-body.open { display: block; }
.stage-label { font-weight: 700; font-size: 0.9em; }
.stage-sub { font-size: 0.78em; color: #666; }
.current-tag { background: #4f46e5; color: #fff; font-size: 0.68em; padding: 2px 8px; border-radius: 8px; font-weight: 700; }

/* Milestone */
.milestone-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.82em; }
.milestone-item:last-child { border-bottom: none; }
.ms-check { flex-shrink: 0; width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #d1d5db; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; margin-top: 1px; }
.ms-check.checked { background: #22c55e; border-color: #16a34a; color: #fff; }
.ms-text { flex: 1; line-height: 1.5; }
.ms-date { font-size: 0.72em; color: #22c55e; font-weight: 600; }

/* Journal */
.journal-form { background: #f8fafc; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.journal-form textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; font-size: 0.85em; font-family: inherit; resize: vertical; min-height: 70px; margin: 8px 0; }
.journal-form select, .journal-form input[type=date], .journal-form input[type=text] { border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 8px; font-size: 0.82em; font-family: inherit; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
.form-label { font-size: 0.78em; color: #555; font-weight: 600; }
.btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.82em; font-weight: 600; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-sm { padding: 4px 10px; font-size: 0.75em; }
.btn-danger { background: #fee2e2; color: #991b1b; }

.journal-entry { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.journal-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.journal-date { font-size: 0.75em; color: #888; }
.journal-text { font-size: 0.85em; line-height: 1.6; color: #333; }

/* Weekly planner */
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
@media (max-width: 700px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
.week-day { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px; min-height: 120px; }
.week-day.today-col { border-color: #1a73e8; border-width: 2px; }
.week-day.gp-day { background: #fffbf0; }
.week-day-label { font-weight: 700; font-size: 0.8em; margin-bottom: 2px; }
.week-day-date { font-size: 0.7em; color: #888; margin-bottom: 6px; }
.week-pillar { font-size: 0.72em; font-weight: 600; padding: 2px 6px; border-radius: 6px; display: inline-block; margin-bottom: 6px; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-bar select, .filter-bar input { border: 1px solid #d1d5db; border-radius: 8px; padding: 5px 10px; font-size: 0.82em; font-family: inherit; }
.filter-bar label { font-size: 0.8em; color: #555; font-weight: 600; }

/* About */
.about-section { margin-bottom: 24px; }
.about-section h3 { font-size: 1em; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #e0e0e0; }
.about-section p { font-size: 0.85em; line-height: 1.7; color: #444; margin-bottom: 8px; }
.about-section ul { padding-left: 18px; font-size: 0.84em; color: #444; }
.about-section li { margin-bottom: 5px; line-height: 1.6; }
.value-table { width: 100%; border-collapse: collapse; font-size: 0.83em; }
.value-table th { text-align: left; padding: 7px 10px; background: #f8fafc; font-weight: 700; border-bottom: 2px solid #e0e0e0; }
.value-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }

/* Export button */
.export-btn { position: fixed; bottom: 20px; right: 20px; background: #1a73e8; color: #fff; border: none; border-radius: 24px; padding: 10px 18px; font-size: 0.83em; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(26,115,232,0.4); z-index: 100; }
.export-btn:hover { background: #1557b0; }

/* Toast */
.toast { position: fixed; bottom: 65px; right: 20px; background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.82em; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Tools list */
.tool-link { display: inline-block; background: #f0f4ff; color: #1e40af; padding: 3px 10px; border-radius: 8px; font-size: 0.78em; text-decoration: none; margin: 3px 2px; }
.tool-link:hover { background: #dbeafe; }

/* Section headers */
.section-header { font-weight: 700; font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin: 14px 0 8px; }

/* Child filter toggle pills */
.child-toggle { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.child-toggle-label { font-size: 0.78em; color: #555; font-weight: 600; margin-right: 2px; }
.child-pill { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: #fff; cursor: pointer; font-size: 0.82em; font-weight: 600; color: #555; transition: all 0.15s; }
.child-pill:hover { border-color: #94a3b8; }
.child-pill.active { border-color: #94a3b8; background: #f3f4f6; color: #374151; }
.child-pill.active.ethan { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
.child-pill.active.elaina { border-color: #ec4899; background: #fdf2f8; color: #be185d; }

/* Yesterday tab */
.checkin-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.checkin-done-list { display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0; }
.done-chip { background: #f0fdf4; border: 1px solid #86efac; color: #166534; border-radius: 12px; padding: 2px 9px; font-size: 0.74em; }
/* Comments tab */
.comment-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
.comment-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.comment-time { font-size: 0.74em; color: #888; }
.comment-text { font-size: 0.85em; color: #333; line-height: 1.5; }
.comment-parsed { font-size: 0.74em; color: #666; margin-top: 4px; font-style: italic; }
.parent-badge { background: #e0e7ff; color: #4338ca; border-radius: 10px; padding: 1px 7px; font-size: 0.72em; font-weight: 700; }
.parent-badge.tiffany { background: #fdf2f8; color: #be185d; }

/* History tab */
.search-result { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
.result-source { font-size: 0.7em; padding: 1px 7px; border-radius: 8px; font-weight: 600; }
.result-text { font-size: 0.85em; color: #333; margin-top: 4px; line-height: 1.5; }
.result-text mark { background: #fef08a; border-radius: 2px; }

/* Events tab */
.event-day-group { margin-bottom: 18px; }
.event-day-header { font-weight: 700; font-size: 0.9em; padding: 6px 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 8px; color: #333; }
.event-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; margin-bottom: 7px; }
.event-title { font-weight: 600; font-size: 0.88em; margin-bottom: 3px; }
.event-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
.event-tag { background: #f0f4ff; color: #1e40af; border-radius: 8px; padding: 1px 7px; font-size: 0.74em; }
.event-cost { background: #f0fdf4; color: #166534; border-radius: 8px; padding: 1px 7px; font-size: 0.74em; }

/* Buy Next tab */
.buynext-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.buynext-title { font-weight: 600; font-size: 0.88em; margin-bottom: 2px; }
.buynext-why { font-size: 0.78em; color: #555; margin-bottom: 5px; }
.buynext-actions { display: flex; gap: 6px; margin-top: 5px; }
.status-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 700; }
.status-suggested { background: #e0e7ff; color: #4338ca; }
.status-bought { background: #dcfce7; color: #166534; }
.status-dismissed { background: #f1f5f9; color: #64748b; }

/* PDF Packs tab */
.pdf-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.pdf-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
.pdf-title { font-weight: 600; font-size: 0.88em; }
.pdf-contents { font-size: 0.78em; color: #555; line-height: 1.5; }

/* Stream filter buttons */
.stream-btn { background:#f1f5f9; border:1px solid #e0e0e0; border-radius:16px; padding:3px 12px; font-size:0.75em; cursor:pointer; color:#555; }
.stream-btn.active { background:#4f46e5; color:#fff; border-color:#4f46e5; }

/* Tracker cards */
.tracker-card { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
.tracker-title { font-weight:700; font-size:0.9em; margin-bottom:4px; }
.tracker-value { font-size:1.5em; font-weight:800; color:#4f46e5; margin-bottom:4px; }
.tracker-sub { font-size:0.75em; color:#666; }
.tracker-log-btn { background:#f0f4ff; color:#4f46e5; border:1px solid #c7d2fe; border-radius:8px; padding:4px 12px; font-size:0.78em; cursor:pointer; margin-top:8px; }
.badge-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:0.72em; font-weight:700; }
.badge-locked { background:#f1f5f9; color:#94a3b8; }
.badge-unlocked { background:#dcfce7; color:#166534; }

/* Adaptation tips */
.adapt-tip { background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:10px 14px; margin-bottom:12px; }
.adapt-tip-title { font-weight:700; font-size:0.8em; color:#92400e; margin-bottom:5px; }
.adapt-tip-row { font-size:0.78em; color:#78350f; margin-bottom:3px; }

/* Schedule editor */
.schedule-editor { background: #f8fafc; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-top: 4px; }
.schedule-editor h4 { font-size: 0.85em; font-weight: 700; margin-bottom: 8px; color: #555; }
.schedule-row { display: flex; gap: 10px; align-items: center; margin-bottom: 7px; flex-wrap: wrap; }
.schedule-row label { font-size: 0.78em; color: #555; min-width: 140px; }
.schedule-row input[type=time] { border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 8px; font-size: 0.82em; }
.schedule-save-btn { background: #1a73e8; color: #fff; border: none; border-radius: 8px; padding: 5px 14px; font-size: 0.8em; cursor: pointer; margin-top: 4px; }

/* Sync status indicator */
.sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.74em; color: #888; padding: 3px 10px; border-radius: 12px; background: #f8fafc; border: 1px solid #e0e0e0; vertical-align: middle; margin-left: 8px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.sync-dot.syncing { background: #f59e0b; animation: syncpulse 1s infinite; }
.sync-dot.offline { background: #9ca3af; }
@keyframes syncpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
/* ── Check-in tab ─────────────────────────────── */
.ci-section { margin: 12px 0; padding: 12px; background: #f8f8f8; border-radius: 8px; }
.ci-section h3 { margin: 0 0 8px; font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: .5px; }
.ci-parent-btns { display: flex; gap: 8px; margin-top: 6px; }
.ci-parent-btn { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
.ci-parent-btn.active { background: #0078d4; color: #fff; border-color: #0078d4; }
.ci-activity { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.ci-act-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.ci-act-label { font-size: 11px; background: #e8f0fe; color: #1a56db; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
.ci-act-title { font-weight: 600; flex: 1; font-size: 14px; }
.ci-act-desc { font-size: 0.85em; color: #666; font-style: italic; margin-top: 2px; }

  { id:'a021', title:'Playground Leader', stages:['s2','s3','s4'], pillar:'teamwork', block:'exploration', duration:20, location:'outdoor', materials:[], desc:'At the playground, let them lead. Follow their choices. Ask "where should we go next?" Give them the experience of being in charge and being followed.', fv:'Accountability to Others — leading means showing the way.' },
  { id:'a022', title:'Sorting Laundry Together', stages:['s2','s3'], pillar:'entrepreneurship', block:'exploration', duration:10, location:'indoor', materials:['laundry'], desc:'Socks together, shirts in a pile. Sort by colour or type. Real household work at toddler scale. Builds categorization, contribution, and "I help this family."', fv:'Family comes first — pull your weight.' },
  { id:'a023', title:'Evening Run Around the Block', stages:['s2','s3','s4'], pillar:'grit', block:'family', duration:15, location:'outdoor', materials:[], desc:'Run one block together when Dad gets home. Short, fast, joyful. Channels the 6 PM energy burst and starts athletic identity early.', fv:'Oxygen Mask First — strong body, strong mind.' },

  // ── Stage 3-4 (Pre-Alpha Bridge) ────────────────────────────────────────────
  { id:'a024', title:'Letter of the Week Scavenger Hunt', stages:['s3','s4'], pillar:'storytelling', block:'learning', duration:10, location:'indoor', materials:['paper', 'marker'], desc:'Pick a letter. Find 5 things in the house that start with it. Write them down. Each week rotate the letter. Builds letter-sound association through real exploration.', fv:'Moral Courage — speak up and tell what you found.' },
  { id:'a025', title:'Coin Sorting & Counting', stages:['s3','s4'], pillar:'entrepreneurship', block:'learning', duration:10, location:'indoor', materials:['jar of mixed coins'], desc:'Sort coins by type. Count them. Learn the names: penny, nickel, dime, quarter. Alpha teaches real financial literacy from PreK — this is the entry point.', fv:'Resilience & Discipline — know what you have.' },
  { id:'a026', title:'Picnic Planner', stages:['s3','s4'], pillar:'teamwork', block:'exploration', duration:15, location:'indoor', materials:['notepad', 'pencil'], desc:'Plan next Saturday\'s snack/lunch together. What do we need? Where should we go? Make a simple list. First taste of project planning and leadership.', fv:'Accountability to Others — plan for the group.' },
  { id:'a027', title:'Family Question Club', stages:['s3','s4','s5'], pillar:'relationships', block:'family', duration:10, location:'indoor', materials:[], desc:'Each person asks one question at dinner — about anything. No wrong questions. Model good questions yourself. Builds curiosity as a shared family value.', fv:'We do the right thing — ask hard questions.' },
  { id:'a028', title:'Grocery Store Mission', stages:['s3','s4'], pillar:'entrepreneurship', block:'exploration', duration:20, location:'outdoor', materials:['short shopping list'], desc:'Give them one item to find at the grocery store. Let them hold it. Compare prices on 2 items. "Which costs more?" First exposure to the marketplace.', fv:'Resilience & Discipline — understand money.' },
  { id:'a029', title:'Story Dictation', stages:['s3','s4'], pillar:'storytelling', block:'learning', duration:10, location:'indoor', materials:['paper or notebook', 'pen'], desc:'They tell a story, you write it down verbatim. Read it back to them. "You wrote a book!" Builds narrative structure and ownership over language.', fv:'Be yourself — your stories are worth keeping.' },
  { id:'a030', title:'Bike Ride to the End of the Street', stages:['s3','s4','s5'], pillar:'grit', block:'morning-move', duration:15, location:'outdoor', materials:['bike or balance bike'], desc:'Set a destination and make it there. Celebrate the finish. Every time, push slightly further. Athletic identity through small wins.', fv:'Oxygen Mask First — go a little further each time.' },

  // ── Stage 4-5 (Alpha PreK) ──────────────────────────────────────────────────
  { id:'a031', title:'IXL PreK Math Session', stages:['s4'], pillar:'entrepreneurship', block:'learning', duration:15, location:'indoor', materials:['tablet or computer', 'IXL account'], desc:'15-minute focused session on IXL PreK math. Mastery-based: don\'t advance until 90%+ on current topic. One topic per session.', fv:'Resilience & Discipline — master one thing before the next.' },
  { id:'a032', title:'Khan Academy Kids Reading', stages:['s4','s5'], pillar:'storytelling', block:'learning', duration:15, location:'indoor', materials:['tablet', 'Khan Academy Kids app (free)'], desc:'15-min session in Khan Academy Kids. Focus on letter sounds, rhymes, early reading. Let them choose the character/story.', fv:'Be yourself — read your own stories.' },
  { id:'a033', title:'LEGO Build Challenge', stages:['s4','s5'], pillar:'entrepreneurship', block:'exploration', duration:20, location:'indoor', materials:['LEGO Duplo or Classic'], desc:'Give a challenge: build the tallest tower, a car, a house with a door. Timed builds add urgency. Introduce iteration: "Can you make it stronger?"', fv:'Resilience & Discipline — solve the problem.' },
  { id:'a034', title:'Fair Play Board Game', stages:['s4','s5'], pillar:'teamwork', block:'exploration', duration:20, location:'indoor', materials:['Candy Land, Snakes & Ladders, or similar'], desc:'Play with real rules. No letting them win. Process losing gracefully. This is one of Alpha\'s explicit life skills — "fair play academy."', fv:'Accountability to Others — play by the rules.' },
  { id:'a035', title:'Family Theatre', stages:['s4','s5'], pillar:'storytelling', block:'family', duration:15, location:'indoor', materials:[], desc:'Act out a scene from a book or make one up. Everyone has a role. Simple costumes optional. Public performance in a safe environment.', fv:'Moral Courage — say your lines even when nervous.' },
  { id:'a036', title:'CrossFit Kids WOD', stages:['s4','s5'], pillar:'grit', block:'morning-move', duration:15, location:'either', materials:[], desc:'5 burpees + 10 squats + 15 jumping jacks = 3 rounds. Scale to ability. Name the movements. This is how John trains — share the culture early.', fv:'Oxygen Mask First — strong body, strong mind.' },
  { id:'a037', title:'Fundraising Lemonade Stand', stages:['s4','s5'], pillar:'entrepreneurship', block:'exploration', duration:45, location:'outdoor', materials:['lemons or juice', 'cups', 'sign', 'cash box'], desc:'Plan, set up, sell, count the money. Decide what to do with earnings. Alpha 5-year-olds do this. Real money, real transaction, real business lesson.', fv:'Resilience & Discipline — create value, earn returns.' },
  { id:'a038', title:'Savings Jar', stages:['s4','s5','s6'], pillar:'entrepreneurship', block:'family', duration:5, location:'indoor', materials:['clear jar', 'coins'], desc:'Give a small allowance (even 25 cents). Put it in the jar. Watch it grow. Introduce the concept: spend jar, save jar. Foundation of financial literacy.', fv:'Resilience & Discipline — save before you spend.' },

  // ── Stage 5-7 (Alpha K-1) ───────────────────────────────────────────────────
  { id:'a039', title:'25-Min Math Pomodoro', stages:['s5'], pillar:'entrepreneurship', block:'learning', duration:25, location:'indoor', materials:['IXL or Math Academy'], desc:'First real Pomodoro session. 25 minutes of focused math. Mandatory Q-break (10 min outdoor play) before the second session. This is Alpha\'s core academic model adapted for home.', fv:'Resilience & Discipline — focused work earns free time.' },
  { id:'a040', title:'25-Min Reading Pomodoro', stages:['s5'], pillar:'storytelling', block:'learning', duration:25, location:'indoor', materials:['reading app or levelled books'], desc:'Second Pomodoro of the morning. Silent reading or guided reading. After 2 sessions, morning academics done — the rest of the day is theirs.', fv:'Be yourself — read what interests you.' },
  { id:'a041', title:'News Reporter', stages:['s5','s6'], pillar:'storytelling', block:'family', duration:10, location:'indoor', materials:[], desc:'Pick one thing that happened today. Report it like a news anchor: who, what, where, when. Record on phone occasionally and watch it back. Public speaking in training.', fv:'Moral Courage — say what happened, clearly.' },
  { id:'a042', title:'5K Training Run', stages:['s5','s6'], pillar:'grit', block:'morning-move', duration:20, location:'outdoor', materials:['running shoes'], desc:'Alpha K-1 kids train for 5Ks. Start with 1km, add each month. Run together. Walk breaks are fine. This is the same progression Dad used for Sporting Life 10K.', fv:'Oxygen Mask First — run toward something.' },
  { id:'a043', title:'Bike Challenge — New Route', stages:['s5','s6'], pillar:'grit', block:'morning-move', duration:20, location:'outdoor', materials:['bike'], desc:'Map a slightly longer or hillier route than last time. Time it. Try to beat the time. Alpha K-1 runs 5-mile bike challenges. Start building toward that goal.', fv:'Oxygen Mask First — a little further every time.' },
  { id:'a044', title:'Duolingo Language Session', stages:['s5','s6'], pillar:'relationships', block:'learning', duration:15, location:'indoor', materials:['tablet or phone', 'Duolingo app'], desc:'15 minutes of a second language. Cantonese (connects to grandparents and heritage), Spanish, or Mandarin. Alpha uses Duolingo. Streak-based motivation works great at this age.', fv:'Be yourself — know where you come from and where you can go.' },
  { id:'a045', title:'Podcast: "Tell Me About..."', stages:['s5','s6','s7'], pillar:'storytelling', block:'exploration', duration:15, location:'indoor', materials:['phone for recording'], desc:'Record a short audio piece about something they\'re interested in: dinosaurs, trucks, swimming. Play it back. Start building the habit of saying what you know out loud.', fv:'Moral Courage — share what you know.' },

  // ── Stage 7-10 (Alpha Grades 2-4) ──────────────────────────────────────────
  { id:'a046', title:'2-Hour Academic Morning', stages:['s6'], pillar:'entrepreneurship', block:'learning', duration:120, location:'indoor', materials:['Math Academy', 'IXL', 'reading apps'], desc:'Three 25-min Pomodoro sessions with Q-breaks between. Math, reading, writing. At this age, Alpha students complete a full grade level every 20–30 hours. Track progress.', fv:'Resilience & Discipline — 2 hours buys the rest of the day.' },
  { id:'a047', title:'Escape Room Challenge', stages:['s6','s7'], pillar:'teamwork', block:'exploration', duration:30, location:'indoor', materials:['puzzle printouts or commercial escape room kit'], desc:'Alpha Grade 2-3 runs escape rooms as a life skill. Set up a room with 3–4 connected puzzles. Solve it together. Then design one for someone else.', fv:'Accountability to Others — we figure it out together.' },
  { id:'a048', title:'BMX Race Prep at Stouffville', stages:['s5','s6','s7'], pillar:'grit', block:'exploration', duration:60, location:'outdoor', materials:['BMX bike', 'helmet', 'pads'], desc:'Practice the race circuit at Stouffville BMX. Time laps. Work on starts. Alpha Grade 2-4 students do FBI fitness challenge and obstacle courses. This is your family\'s version.', fv:'Oxygen Mask First — compete against yourself.' },
  { id:'a049', title:'Rubik\'s Cube Challenge', stages:['s6','s7'], pillar:'grit', block:'exploration', duration:20, location:'indoor', materials:["Rubik's cube"], desc:'Alpha explicitly uses Rubik\'s cube as a life skills challenge. Learn one layer at a time over weeks. Teaches systematic problem-solving and patience under frustration.', fv:'Resilience & Discipline — one layer at a time.' },
  { id:'a050', title:'School News Broadcast', stages:['s6'], pillar:'storytelling', block:'exploration', duration:20, location:'indoor', materials:['phone camera', 'notepad'], desc:'Script and film a 2-min "news broadcast" about something that happened this week. Watch and critique together. Public speaking rehearsal without the stage fright.', fv:'Moral Courage — go on record.' },
  { id:'a051', title:'HALC Open Swim Training', stages:['s4','s5','s6','s7'], pillar:'grit', block:'morning-move', duration:60, location:'outdoor', materials:['swimsuit', 'goggles'], desc:'Weekly HALC open swim. Set a distance target. Work on stroke technique. Track laps over time. The water is one of the best physical classrooms.', fv:'Oxygen Mask First — every swim is training.' },
  { id:'a052', title:'Farmers Market Responsibility', stages:['s4','s5','s6'], pillar:'entrepreneurship', block:'exploration', duration:45, location:'outdoor', materials:['small amount of cash'], desc:'Give them a budget ($3–5) at the Riverwalk Commons market. They buy one item of their choice. Practice counting money, asking vendors questions, making decisions.', fv:'Resilience & Discipline — spend it well.' },

  // ── Stage 10-13 (Alpha Grades 5-8) ─────────────────────────────────────────
  { id:'a053', title:'Full Alpha Academic Block', stages:['s7'], pillar:'entrepreneurship', block:'learning', duration:120, location:'indoor', materials:['Math Academy', 'IXL', 'AlphaWrite-equivalent'], desc:'Full 2-hour block with Pomodoros. Mastery-gated advancement. At this stage, students who stay consistent can complete 2+ grade levels per year. Track MAP-equivalent progress quarterly.', fv:'Resilience & Discipline — compress the work, free the afternoon.' },
  { id:'a054', title:'TEDx-Style Family Talk', stages:['s6','s7'], pillar:'storytelling', block:'exploration', duration:30, location:'indoor', materials:['slides optional'], desc:'Pick a topic they care about. Prepare a 5-minute talk. Deliver it to the family. Get feedback. Repeat 2x/year. This is what Alpha Grade 6-8 students do at real TEDx events.', fv:'Moral Courage — say what you believe, in public.' },
  { id:'a055', title:'Micro-Business Launch', stages:['s7'], pillar:'entrepreneurship', block:'exploration', duration:60, location:'either', materials:['depends on business'], desc:'Design and run a real small business. Car washing service, baked goods, lawn care. Track revenue and costs. Alpha 8th graders raise $10K. Start simpler.', fv:'Resilience & Discipline — create value, own the outcome.' },
  { id:'a056', title:'Spartan Race Training with Dad', stages:['s7'], pillar:'grit', block:'morning-move', duration:45, location:'outdoor', materials:[], desc:'Train together for an obstacle race. Run + strength circuit. Shared suffering is the strongest bonding mechanism there is. Alpha 8th graders complete Tough Mudder.', fv:'Oxygen Mask First — strong together.' },
  { id:'a057', title:'Coding Project', stages:['s6','s7'], pillar:'entrepreneurship', block:'exploration', duration:30, location:'indoor', materials:['computer', 'Scratch or Python'], desc:'Alpha Grade 4-5+ codes drones and video games. Start with Scratch, move to Python. Pick one project and ship it. "Shipped" means showed it to someone outside the family.', fv:'Resilience & Discipline — build something real.' },
  { id:'a058', title:'Outdoor Certification Pursuit', stages:['s7'], pillar:'grit', block:'exploration', duration:120, location:'outdoor', materials:['depends on cert'], desc:'Alpha 8th graders earn sailing certifications. Pick one outdoor certification to pursue over a year: swimming levels, hiking badge, sailing course, cycling certification.', fv:'Oxygen Mask First — earn the credential.' },

  // ── Cross-stage evening Dad activities (Mon-Wed) ────────────────────────────
  { id:'a059', title:'Evening Book (Dad reads)', stages:['s0','s1','s2','s3','s4','s5'], pillar:'relationships', block:'family', duration:10, location:'indoor', materials:['picture book or chapter book'], desc:'10 minutes of reading together when Dad gets home. Same book, every night for a week. Repetition is how toddlers learn — and it\'s connection time at the end of a long day.', fv:'Family comes first.' },
  { id:'a060', title:'Living Room Wrestle', stages:['s2','s3','s4'], pillar:'grit', block:'family', duration:10, location:'indoor', materials:[], desc:'Rough and tumble play at 6 PM. Safe, joyful, physical contact. Research shows this type of play (Dad-style) builds risk calibration and emotional regulation in kids.', fv:'Oxygen Mask First — play hard, laugh hard.' },
  { id:'a061', title:'One Question Before Bed', stages:['s3','s4','s5','s6'], pillar:'storytelling', block:'family', duration:5, location:'indoor', materials:[], desc:'"What\'s one thing you want to know about?" Anything goes. Look it up together if you don\'t know. Makes learning conversational and positions parents as co-investigators.', fv:'We do the right thing — ask the question.' },

  // ── EXPANDED: Stage 0-1 (more infant variety) ──────────────────────────────
  { id:'a062', title:'Kick Time on Play Mat', stages:['s0'], pillar:'grit', block:'morning-move', duration:10, location:'indoor', materials:['play gym with dangling toys'], desc:'Lay baby on back under a play gym. Let them kick and bat at toys. Builds leg strength and hand-eye coordination. Celebrate every successful grab.', fv:'We try hard, even when things are hard.' },
  { id:'a063', title:'Narrated Diaper Change', stages:['s0'], pillar:'storytelling', block:'learning', duration:3, location:'indoor', materials:[], desc:'"Now I\'m lifting your left leg. Here comes the new diaper. All clean!" Narrate every step. Builds language exposure and trust through predictable routines.', fv:'Moral Courage — use your words, always.' },
  { id:'a064', title:'Baby Massage', stages:['s0'], pillar:'relationships', block:'family', duration:10, location:'indoor', materials:['baby-safe lotion or coconut oil'], desc:'Gentle leg, arm, and belly massage. Reduces fussiness, builds bonding. Make eye contact and sing while you massage. One of the deepest connection activities at this age.', fv:'Family comes first.' },
  { id:'a065', title:'Peek-a-Boo', stages:['s0','s1'], pillar:'storytelling', block:'exploration', duration:5, location:'indoor', materials:['blanket or hands'], desc:'Cover your face, uncover. Repeat. Builds object permanence (the understanding that things exist even when hidden) — a foundational cognitive milestone.', fv:'Be brave and honest — surprise is part of life.' },
  { id:'a066', title:'Stroller Nature Walk (Listen)', stages:['s0','s1'], pillar:'relationships', block:'morning-move', duration:15, location:'outdoor', materials:['stroller'], desc:'Walk through a park or neighbourhood. Point at sounds: "Hear the bird? That\'s wind in the trees." Auditory exposure in nature builds calm and attention.', fv:'Family comes first — slow walks build connection.' },
  { id:'a067', title:'Crinkle Paper Exploration', stages:['s0'], pillar:'entrepreneurship', block:'exploration', duration:5, location:'indoor', materials:['crinkle fabric or tissue paper'], desc:'Let baby grab, crunch, and explore crinkly textures. Cause and effect: "I squeeze, it makes noise." Supervise closely. Earliest problem-solving loop.', fv:'Resilience starts with curiosity.' },
  { id:'a068', title:'Dance & Sway', stages:['s0','s1'], pillar:'grit', block:'morning-move', duration:5, location:'indoor', materials:[], desc:'Hold baby and dance to music. Sway, bounce gently, spin slowly. Vestibular stimulation builds balance pathways. Plus: you get to move too.', fv:'Oxygen Mask First — move your body, even with a baby.' },
  { id:'a069', title:'Face-to-Face Talking', stages:['s0'], pillar:'storytelling', block:'learning', duration:5, location:'indoor', materials:[], desc:'Hold baby 8-12 inches from your face. Talk, make exaggerated expressions, wait for responses. Babies imitate facial expressions from 2 months. This is conversation before words.', fv:'Be yourself — show your face.' },
  { id:'a070', title:'Splash Bath Play', stages:['s0','s1'], pillar:'grit', block:'exploration', duration:10, location:'indoor', materials:['baby bath', 'cups'], desc:'During bath time, let baby kick and splash freely. Pour water gently over legs. Builds comfort in water — head start for HALC swim sessions later.', fv:'Oxygen Mask First — get comfortable in the water early.' },
  { id:'a071', title:'Shadow Play (Sunny Window)', stages:['s0','s1'], pillar:'storytelling', block:'exploration', duration:5, location:'indoor', materials:[], desc:'On a sunny day, make hand shadows on the wall for baby. Move slowly. They track movement and contrast. Simple entertainment that builds visual focus.', fv:'Be yourself — play with what you have.' },

  // ── EXPANDED: Stage 1-2 (more toddler variety) ─────────────────────────────
  { id:'a072', title:'Push & Pull Toy Walk', stages:['s1','s2'], pillar:'grit', block:'morning-move', duration:10, location:'indoor', materials:['push toy or pull wagon'], desc:'Walk behind a push toy or pull a wagon. Builds stability, confidence, and motivation to keep walking. Set a "destination" (the kitchen!) and celebrate arrival.', fv:'We try hard, even when things are hard.' },
  { id:'a073', title:'Pots & Pans Band', stages:['s1','s2'], pillar:'storytelling', block:'exploration', duration:10, location:'indoor', materials:['pots', 'wooden spoons', 'containers'], desc:'Lay out pots and hit them with wooden spoons. Different sizes = different sounds. Rhythm, cause-effect, and pure toddler joy. Loud but developmental.', fv:'Be yourself — make your noise.' },
  { id:'a074', title:'Fill & Dump', stages:['s1'], pillar:'entrepreneurship', block:'learning', duration:8, location:'indoor', materials:['container', 'blocks or balls'], desc:'Fill a container with objects, dump them out, repeat. This is the toddler version of inventory management — in/out, full/empty, cause/effect.', fv:'Resilience & Discipline — do the work, see the result.' },
  { id:'a075', title:'Stacking Rings', stages:['s1'], pillar:'entrepreneurship', block:'learning', duration:8, location:'indoor', materials:['stacking ring toy'], desc:'Put rings on the pole, biggest to smallest. Ordering and sequencing — the earliest math concept after counting. Celebrate correct placement.', fv:'Resilience & Discipline — order matters.' },
  { id:'a076', title:'Name the Body Parts', stages:['s1','s2'], pillar:'storytelling', block:'learning', duration:5, location:'indoor', materials:[], desc:'"Where\'s your nose? Where\'s your tummy?" Touch and name. Then ask them to point. Vocabulary explosion happens through body awareness — 50+ words by 18 months is the target.', fv:'Be yourself — know your body.' },
  { id:'a077', title:'Climbing Playground', stages:['s1','s2'], pillar:'grit', block:'exploration', duration:20, location:'outdoor', materials:[], desc:'Find a toddler-safe structure and let them climb. Spot but don\'t lift. Let them struggle, problem-solve, and succeed. This is where physical grit is born.', fv:'Oxygen Mask First — climb your own mountain.' },
  { id:'a078', title:'Simple Puzzles (2-4 pieces)', stages:['s1','s2'], pillar:'entrepreneurship', block:'learning', duration:10, location:'indoor', materials:['wooden knob puzzle'], desc:'Knob puzzles with 2-4 pieces. Match the shape to the hole. Spatial reasoning + persistence. When they get one, clap. When they struggle, wait before helping.', fv:'Resilience & Discipline — find where it fits.' },
  { id:'a079', title:'Follow the Leader Walk', stages:['s1','s2'], pillar:'teamwork', block:'morning-move', duration:10, location:'outdoor', materials:[], desc:'Walk, then stop. Step up, then down. They follow. Then let them lead and you follow. First leadership experience — "I go, and someone follows me."', fv:'Accountability to Others — lead the way.' },

  // ── EXPANDED: Stage 2-3 (more for Ethan now) ───────────────────────────────
  { id:'a080', title:'Play-Doh Shapes', stages:['s2','s3'], pillar:'storytelling', block:'exploration', duration:15, location:'indoor', materials:['play-doh', 'cookie cutters'], desc:'Roll, squish, cut shapes. Name each one. "What did you make? A snake? A ball?" Sensory creativity plus vocabulary. Let them lead — you describe.', fv:'Be yourself — create what you see.' },
  { id:'a081', title:'Colour Scavenger Hunt', stages:['s2','s3'], pillar:'storytelling', block:'learning', duration:10, location:'indoor', materials:[], desc:'"Find something red!" Run around the house finding items of each colour. Active learning that links language to observation. 5 colours = 10 minute game.', fv:'Moral Courage — name what you see.' },
  { id:'a082', title:'Kitchen Helper (Stirring)', stages:['s2','s3'], pillar:'teamwork', block:'exploration', duration:15, location:'indoor', materials:['bowl', 'spoon', 'safe ingredients'], desc:'Let them stir pancake batter, toss salad, rinse fruit. Real contribution to the family meal. Stand on a learning tower if needed. Name every ingredient.', fv:'Accountability to Others — pitch in.' },
  { id:'a083', title:'Balance Beam (Tape Line)', stages:['s2','s3'], pillar:'grit', block:'morning-move', duration:10, location:'indoor', materials:['painters tape'], desc:'Put tape on the floor in a straight line. Walk on it without stepping off. Then add turns. Then walk backwards. Progressive difficulty at zero cost.', fv:'Oxygen Mask First — control your body.' },
  { id:'a084', title:'Sticker Art', stages:['s2','s3'], pillar:'entrepreneurship', block:'exploration', duration:15, location:'indoor', materials:['stickers', 'paper'], desc:'Peeling stickers off the sheet is a fine motor workout. Place them on paper to "design" something. Count how many they used. Art + counting in one activity.', fv:'Resilience & Discipline — peel, stick, count.' },
  { id:'a085', title:'Sand Pit Digging', stages:['s2','s3','s4'], pillar:'grit', block:'exploration', duration:20, location:'outdoor', materials:['sandbox or beach', 'shovels', 'buckets'], desc:'Dig, fill, dump, build. Sandcastles or just holes. The sustained effort of digging is underrated — it\'s physical labour that toddlers love.', fv:'We try hard, even when things are hard.' },
  { id:'a086', title:'Freeze Dance', stages:['s2','s3','s4'], pillar:'teamwork', block:'morning-move', duration:10, location:'indoor', materials:['music source'], desc:'Play music, dance. Stop music, freeze. Anyone who moves is "out" (but everyone keeps playing). Teaches impulse control, listening, and shared rules.', fv:'Accountability to Others — follow the rules together.' },
  { id:'a087', title:'Puddle Jumping', stages:['s2','s3'], pillar:'grit', block:'morning-move', duration:15, location:'outdoor', materials:['rain boots'], desc:'After rain: find puddles and jump in every one. Measure: which is deepest? Which splashes most? Turns a rainy day from an obstacle into an adventure.', fv:'Oxygen Mask First — obstacles are opportunities.' },
  { id:'a088', title:'Blanket Fort', stages:['s2','s3','s4'], pillar:'storytelling', block:'exploration', duration:20, location:'indoor', materials:['blankets', 'pillows', 'chairs'], desc:'Build a fort together. Decide what it is — a castle, a spaceship, a bear cave. Play inside. Imagination + construction + collaborative story creation.', fv:'Be yourself — build your own world.' },
  { id:'a089', title:'Drawing & Telling', stages:['s2','s3'], pillar:'storytelling', block:'learning', duration:10, location:'indoor', materials:['crayons', 'paper'], desc:'Draw anything. Then ask: "Tell me about your picture." Write their words at the bottom. Their scribbles become a story — and they see that marks on paper carry meaning.', fv:'Moral Courage — say what you drew.' },
  { id:'a090', title:'Grocery Shopping Helper', stages:['s2','s3','s4'], pillar:'entrepreneurship', block:'exploration', duration:20, location:'indoor', materials:['grocery list (pictures for young ones)'], desc:'Give them 2-3 items to find in the store. Let them put it in the cart. At checkout, let them hand items to the cashier. Real participation in a real transaction.', fv:'Resilience & Discipline — you have a job to do.' },
  { id:'a091', title:'Bubble Chase', stages:['s1','s2'], pillar:'grit', block:'morning-move', duration:10, location:'outdoor', materials:['bubble solution'], desc:'Blow bubbles and let them chase, pop, and stomp. Full-body movement triggered by tracking a target. Coordination + cardio disguised as pure fun.', fv:'Oxygen Mask First — move your body.' },

  // ── EXPANDED: Stage 3-4 (Pre-Alpha Bridge) ─────────────────────────────────
  { id:'a092', title:'Pattern Blocks', stages:['s3','s4'], pillar:'entrepreneurship', block:'learning', duration:15, location:'indoor', materials:['pattern blocks + cards'], desc:'Match coloured blocks to pattern cards. Then make your own pattern. Spatial reasoning, colour matching, and early geometry. Foundation for later math visual thinking.', fv:'Resilience & Discipline — follow the pattern, then break it.' },
  { id:'a093', title:'Nature Collection Walk', stages:['s3','s4','s5'], pillar:'storytelling', block:'exploration', duration:20, location:'outdoor', materials:['bag or basket'], desc:'Walk a trail and collect interesting things: pine cones, rocks, leaves, feathers. Back home, arrange them and describe each one. Science + language + outdoor movement.', fv:'Be yourself — notice what catches your eye.' },
  { id:'a094', title:'Hopscotch', stages:['s3','s4','s5'], pillar:'grit', block:'morning-move', duration:10, location:'outdoor', materials:['chalk'], desc:'Draw a hopscotch grid. Number the squares. Jump and call the number. Balance on one foot. Classic physical literacy that combines counting and coordination.', fv:'Oxygen Mask First — challenge your balance.' },
  { id:'a095', title:'Simple Card Games (Go Fish, Snap)', stages:['s3','s4'], pillar:'teamwork', block:'family', duration:15, location:'indoor', materials:['deck of cards'], desc:'Go Fish teaches turn-taking, memory, and asking questions. Snap teaches speed and attention. Both teach winning/losing gracefully. Better than screen time every time.', fv:'Accountability to Others — play fair.' },
  { id:'a096', title:'Dress-Up Storytelling', stages:['s3','s4'], pillar:'storytelling', block:'exploration', duration:15, location:'indoor', materials:['costume box or random clothes'], desc:'Put on costumes and become characters. Narrate what the character does. "I\'m a firefighter! What should I rescue?" Dramatic play builds empathy and language.', fv:'Be yourself — try on different lives.' },
  { id:'a097', title:'Helping with Laundry (Folding)', stages:['s3','s4'], pillar:'teamwork', block:'exploration', duration:10, location:'indoor', materials:['laundry'], desc:'Match socks, fold washcloths, stack towels. Real household contribution. Name the clothing items and colours. "How many blue socks?" Math sneaks in everywhere.', fv:'Accountability to Others — contribute to the house.' },
  { id:'a098', title:'Simple Cooking (No Heat)', stages:['s3','s4','s5'], pillar:'entrepreneurship', block:'exploration', duration:20, location:'indoor', materials:['measuring cups', 'ingredients'], desc:'Make trail mix, fruit salad, or overnight oats. Measure, pour, mix. Count ingredients. Following a recipe is a process — same skill as following instructions.', fv:'Resilience & Discipline — measure twice, mix once.' },
  { id:'a099', title:'Bedtime Story Retell', stages:['s3','s4'], pillar:'storytelling', block:'family', duration:5, location:'indoor', materials:[], desc:'After reading a book, ask them to retell it in their own words. "What happened first? Then what?" Sequencing and comprehension check wrapped in conversation.', fv:'Moral Courage — tell it your way.' },

  // ── EXPANDED: Stage 4-5 (Alpha PreK) ───────────────────────────────────────
  { id:'a100', title:'Scissor Cutting Practice', stages:['s4'], pillar:'grit', block:'learning', duration:10, location:'indoor', materials:['safety scissors', 'paper with lines'], desc:'Cut along straight lines, then curves. Fine motor control that directly supports future writing. Frustrating at first — that\'s the point.', fv:'We try hard, even when things are hard.' },
  { id:'a101', title:'Counting Coins for Real', stages:['s4','s5'], pillar:'entrepreneurship', block:'learning', duration:10, location:'indoor', materials:['coins', 'piggy bank'], desc:'Count the coins in their savings jar. Group by type. Add up the total. "You have $2.37!" Connects abstract math to real money they own.', fv:'Resilience & Discipline — know your number.' },
  { id:'a102', title:'Bike Without Training Wheels', stages:['s4','s5'], pillar:'grit', block:'morning-move', duration:20, location:'outdoor', materials:['bike', 'helmet'], desc:'The big milestone. Start on grass for soft falls. Run alongside. Let go. This single achievement builds more confidence than a month of worksheets.', fv:'Oxygen Mask First — fall, get up, ride.' },
  { id:'a103', title:'Zoo Animal Research', stages:['s4','s5'], pillar:'storytelling', block:'exploration', duration:15, location:'indoor', materials:[], desc:'Pick one animal from a recent zoo visit. Find 3 facts about it. Draw it. Present to the family: "This is a red panda. It lives in China..." Mini research project.', fv:'Moral Courage — share what you learned.' },
  { id:'a104', title:'Helping Cook (With Heat)', stages:['s4','s5','s6'], pillar:'teamwork', block:'exploration', duration:25, location:'indoor', materials:['ingredients', 'kid-safe knife'], desc:'Scrambled eggs, pancakes, stir fry (supervised). Measure, crack eggs, flip with spatula. Real cooking with real responsibility. Alpha PreK does cooking workshops.', fv:'Accountability to Others — feed the family.' },
  { id:'a105', title:'Cleaning Their Own Room', stages:['s4','s5','s6'], pillar:'teamwork', block:'exploration', duration:15, location:'indoor', materials:[], desc:'Not "clean your room" — do it together with a system: toys in bins, books on shelf, clothes in hamper. Building a process they can eventually own alone.', fv:'Accountability to Others — take care of your space.' },

  // ── EXPANDED: Stage 5-7 (Alpha K-1) ────────────────────────────────────────
  { id:'a106', title:'Journal Writing (5 sentences)', stages:['s5','s6'], pillar:'storytelling', block:'learning', duration:15, location:'indoor', materials:['notebook', 'pencil'], desc:'Write 5 sentences about yesterday. Spelling doesn\'t matter — fluency does. Read it aloud. Over time, entries get longer and more detailed. This is AlphaWrite at home.', fv:'Moral Courage — put your thoughts on paper.' },
  { id:'a107', title:'Measurement Scavenger Hunt', stages:['s5','s6'], pillar:'entrepreneurship', block:'learning', duration:15, location:'indoor', materials:['ruler or tape measure'], desc:'Measure 10 things in the house. Record them. Which is longest? Shortest? How many pencils tall is the table? Hands-on math that connects numbers to the real world.', fv:'Resilience & Discipline — measure everything.' },
  { id:'a108', title:'Skipping Rope Challenge', stages:['s5','s6'], pillar:'grit', block:'morning-move', duration:10, location:'outdoor', materials:['skipping rope'], desc:'Count consecutive jumps. Beat yesterday\'s record. Simple, portable, and effective cardio. Alpha K-1 does physical challenges daily — this is yours.', fv:'Oxygen Mask First — beat your number.' },
  { id:'a109', title:'Family Movie Review', stages:['s5','s6','s7'], pillar:'storytelling', block:'family', duration:10, location:'indoor', materials:[], desc:'After watching a movie together, everyone gives a review: what they liked, what they\'d change, who was the best character and why. Critical thinking as a family ritual.', fv:'Moral Courage — say your real opinion.' },
  { id:'a110', title:'Teaching a Younger Sibling', stages:['s5','s6','s7'], pillar:'teamwork', block:'exploration', duration:15, location:'indoor', materials:[], desc:'Teach Elaina something: a clapping game, animal sounds, how to stack blocks. Teaching forces you to organize knowledge. Alpha uses peer teaching extensively.', fv:'Accountability to Others — share what you know.' },
  { id:'a111', title:'Map Reading Walk', stages:['s5','s6'], pillar:'entrepreneurship', block:'exploration', duration:25, location:'outdoor', materials:['printed neighbourhood map'], desc:'Print a simple map of the neighbourhood. Navigate to a destination using the map. "We need to turn right at this street." Spatial reasoning meets real-world navigation.', fv:'Resilience & Discipline — find your way.' },
  { id:'a112', title:'Gratitude List at Dinner', stages:['s4','s5','s6','s7'], pillar:'relationships', block:'family', duration:5, location:'indoor', materials:[], desc:'Each person names 3 things they\'re grateful for today. Write them down in a family gratitude journal. Over months, you can see patterns and growth.', fv:'Family comes first — appreciate what we have.' },

  // ── EXPANDED: Stage 7-10 (Alpha Grades 2-4) ───────────────────────────────
  { id:'a113', title:'Chess', stages:['s6','s7'], pillar:'entrepreneurship', block:'exploration', duration:30, location:'indoor', materials:['chess set'], desc:'Learn one piece at a time over weeks. Chess teaches strategy, consequence, and patience. Alpha uses systematic problem-solving challenges — chess is the classic version.', fv:'Resilience & Discipline — think 3 moves ahead.' },
  { id:'a114', title:'Rock Climbing Gym', stages:['s5','s6','s7'], pillar:'grit', block:'exploration', duration:60, location:'indoor', materials:['climbing gym membership'], desc:'Indoor bouldering or roped climbing. Problem-solving with your body. Fear management. Alpha kindergarteners climb 40-foot rock walls. Start at any age.', fv:'Oxygen Mask First — climb higher than yesterday.' },
  { id:'a115', title:'Letter to a Relative', stages:['s6','s7'], pillar:'relationships', block:'exploration', duration:20, location:'indoor', materials:['paper', 'envelope', 'stamp'], desc:'Write a real letter to grandparents or a cousin. Mail it. Receiving a reply is magic. Builds writing skills and family connection simultaneously.', fv:'Family comes first — stay connected.' },
  { id:'a116', title:'Cooking a Full Meal', stages:['s6','s7'], pillar:'teamwork', block:'exploration', duration:45, location:'indoor', materials:['full recipe ingredients'], desc:'Plan, shop for ingredients (budgeted), cook, and serve a full dinner for the family. Alpha Grade 4-5 does outdoor cooking on camping trips. Start in the kitchen.', fv:'Accountability to Others — feed the people you love.' },
  { id:'a117', title:'Family Debate Night', stages:['s6','s7'], pillar:'storytelling', block:'family', duration:20, location:'indoor', materials:[], desc:'Pick a fun topic: "Is pizza better than tacos?" Each side has 2 minutes to argue. Rebuttals allowed. Builds structured argumentation in a low-stakes environment.', fv:'Moral Courage — argue your position.' },
  { id:'a118', title:'Timed Math Drills', stages:['s6','s7'], pillar:'entrepreneurship', block:'learning', duration:10, location:'indoor', materials:['timer', 'math worksheet or Rocket Math'], desc:'50 problems, 5 minutes. Track the score. Beat it next time. Alpha uses FastMath Pro for exactly this — speed builds fluency, fluency builds confidence.', fv:'Resilience & Discipline — get faster every day.' },
  { id:'a119', title:'Trail Run (3-5 km)', stages:['s6','s7'], pillar:'grit', block:'morning-move', duration:30, location:'outdoor', materials:['running shoes'], desc:'Run trails, not roads. Uneven ground builds agility and ankle strength. Track distance over months. Alpha Grade 2-4 trains for the FBI fitness challenge.', fv:'Oxygen Mask First — run where it\'s harder.' },

  // ── EXPANDED: Stage 10-13 (Alpha Grades 5-8) ──────────────────────────────
  { id:'a120', title:'Budget & Invest Simulation', stages:['s7'], pillar:'entrepreneurship', block:'learning', duration:30, location:'indoor', materials:['computer', 'spreadsheet'], desc:'Give them a virtual $10,000. Research stocks, pick 5, track returns weekly for a quarter. Alpha teaches real financial literacy. This is the home version.', fv:'Resilience & Discipline — risk, reward, and patience.' },
  { id:'a121', title:'Build a Website', stages:['s7'], pillar:'entrepreneurship', block:'exploration', duration:60, location:'indoor', materials:['computer'], desc:'Build a simple website about something they care about. HTML/CSS basics or a no-code tool. Ship it. Share the URL with friends. Making things public builds accountability.', fv:'Resilience & Discipline — build and ship.' },
  { id:'a122', title:'Volunteer / Community Service', stages:['s6','s7'], pillar:'relationships', block:'exploration', duration:120, location:'outdoor', materials:[], desc:'Food bank, park cleanup, visiting seniors. Scheduled monthly. Alpha students teach peers internationally. Start with local service that makes contribution visible.', fv:'Family comes first — and so does community.' },
  { id:'a123', title:'Book Club (Parent + Child)', stages:['s6','s7'], pillar:'storytelling', block:'family', duration:20, location:'indoor', materials:['same book for both'], desc:'Read the same book separately. Discuss one chapter per week at dinner. Disagree about characters. Predict endings. Adult-level discussion at a kid-friendly pace.', fv:'Moral Courage — form and defend your own reading.' },
  { id:'a124', title:'Solo Overnight Camp', stages:['s7'], pillar:'grit', block:'exploration', duration:1440, location:'outdoor', materials:['camp gear'], desc:'One night away from home at a structured camp program. Alpha builds toward increasing independence. This is a massive confidence builder — the kind of experience you remember at 30.', fv:'Oxygen Mask First — prove you can handle it.' },
  { id:'a125', title:'Teach Dad Something', stages:['s6','s7'], pillar:'storytelling', block:'family', duration:15, location:'indoor', materials:[], desc:'They pick a topic they know better than you (a video game, a book, a sport technique). They teach you. Reversal of the parent-child dynamic builds confidence and communication.', fv:'Moral Courage — be the expert.' },

  // ── YORK REGION VENUE-SPECIFIC (John's actual weekly spots) ─────────────────
  { id:'a126', title:'HALC Toddler Swim (Newmarket)', stages:['s1','s2','s3','s4'], pillar:'grit', block:'morning-move', duration:45, location:'outdoor', materials:['swim diaper', 'towel'], desc:'Healthy Active Living Centre open swim — mornings through ~1:30 PM. Hold hands in the water, blow bubbles, practice kicks. Building water confidence early makes formal swim lessons easier later.', fv:'Oxygen Mask First — start in the water young.' },
  { id:'a127', title:'HALC Parent & Tot Gym', stages:['s1','s2','s3'], pillar:'grit', block:'morning-move', duration:45, location:'indoor', materials:[], desc:'HALC drop-in parent & tot gym sessions. Soft mats, climbing structures, balls. Supervised free play with other toddlers. Social + physical in one session.', fv:'Oxygen Mask First — move with other kids.' },
  { id:'a128', title:'Stouffville BMX Track Ride', stages:['s3','s4','s5','s6'], pillar:'grit', block:'exploration', duration:45, location:'outdoor', materials:['balance bike or BMX bike', 'helmet'], desc:'Stouffville BMX track when closed to racing. Ride the berms and rollers at your own pace. Dad rides too. Shared athletic experience on a real course.', fv:'Oxygen Mask First — ride the real track.' },
  { id:'a129', title:'Uxbridge Pump Track', stages:['s3','s4','s5','s6','s7'], pillar:'grit', block:'exploration', duration:30, location:'outdoor', materials:['bike or scooter', 'helmet'], desc:'Uxbridge pump track — no pedaling, just pumping the rollers. Teaches rhythm, momentum, and body control. Great progression from balance bike to real riding.', fv:'Oxygen Mask First — pump, don\'t pedal.' },
  { id:'a130', title:'Riverwalk Commons Farmers Market', stages:['s2','s3','s4','s5'], pillar:'entrepreneurship', block:'exploration', duration:40, location:'outdoor', materials:['small cash for purchases'], desc:'Saturday mornings at Riverwalk Commons, Newmarket. Walk the stalls, taste samples, pick one thing to buy with their own money. Combine with splash pad after. Real marketplace exposure.', fv:'Resilience & Discipline — choose wisely.' },
  { id:'a131', title:'Riverwalk Splash Pad', stages:['s1','s2','s3','s4'], pillar:'relationships', block:'exploration', duration:30, location:'outdoor', materials:['swimsuit', 'towel'], desc:'Splash pad at Riverwalk Commons after the farmers market. Free, toddler-friendly, social. Combine with market trip for a full Saturday morning outing.', fv:'Family comes first — play together.' },
  { id:'a132', title:'Junior Explorer Nature Walk', stages:['s3','s4','s5','s6'], pillar:'storytelling', block:'exploration', duration:60, location:'outdoor', materials:[], desc:'TRCA or local conservation area Junior Explorer / forest school programs. Guided nature walks, bug identification, creek exploration. Learn to name what you see in the wild.', fv:'Be yourself — explore your world.' },
  { id:'a133', title:'Toronto Zoo Season Pass Day', stages:['s1','s2','s3','s4','s5','s6'], pillar:'storytelling', block:'exploration', duration:180, location:'outdoor', materials:['season pass', 'stroller', 'snacks'], desc:'Monthly zoo visit with a focus animal each time. Read the placard, find 3 facts, sketch the animal. Builds observation and research habits in a place you already love.', fv:'Be yourself — find your favourite animal.' },
  { id:'a134', title:'Canada\'s Wonderland (Kidzville)', stages:['s2','s3','s4','s5'], pillar:'grit', block:'exploration', duration:180, location:'outdoor', materials:['season pass'], desc:'Kidzville rides at Wonderland. Each visit, try one ride that was "too scary" last time. Track which rides they\'ve conquered. Progressive courage-building at an amusement park.', fv:'Oxygen Mask First — ride the next one up.' },
  { id:'a135', title:'Library Story Time (Aurora/Newmarket)', stages:['s1','s2','s3','s4'], pillar:'storytelling', block:'exploration', duration:30, location:'indoor', materials:[], desc:'Free weekly story time at Aurora or Newmarket public library. Listening to someone who isn\'t Mom or Dad read builds attention span and social listening skills.', fv:'Moral Courage — listen to new voices.' },
  { id:'a136', title:'Organic PYO Farm Visit', stages:['s3','s4','s5','s6'], pillar:'entrepreneurship', block:'exploration', duration:90, location:'outdoor', materials:['baskets'], desc:'Seasonal pick-your-own at an organic/pesticide-free farm (no conventional farms). Strawberries, blueberries, apples by season. Pick, weigh, pay. Food doesn\'t come from the store.', fv:'Resilience & Discipline — harvest what you eat.' },
  { id:'a137', title:'Air Riderz Toddler Time (Aurora)', stages:['s2','s3','s4'], pillar:'grit', block:'exploration', duration:60, location:'indoor', materials:[], desc:'Under-5 exclusive sessions Sat/Sun 10-11 AM. Trampolines, ninja course, foam pit, climbing. Athletic development in a padded environment. Perfect for rainy weekends.', fv:'Oxygen Mask First — bounce higher.' },
  { id:'a138', title:'Sugarbush Maple Syrup Festival (Stouffville)', stages:['s2','s3','s4','s5'], pillar:'entrepreneurship', block:'exploration', duration:120, location:'outdoor', materials:[], desc:'Seasonal at Bruce\'s Mill. Wagon rides, sugar shack, maple taffy on snow. Learn how sap becomes syrup — a real production process a plant engineer\'s kid should understand.', fv:'Resilience & Discipline — raw material becomes product.' },
];

// ── STREAM 2: CHARACTER + SOFT SKILLS ─────────────────────────────────────────
const CHARACTER_ACTIVITIES = [
  { id:'c001', title:'Emotion Wheel Check-In', stages:['s1','s2','s3','s4'], pillar:'relationships', stream:'character', block:'learn', duration:5, location:'indoor', materials:['emotion wheel printout'], desc:'Point to how you feel on the wheel. Name it. No fix needed — just name it. Source: Whole Brain Child (Siegel/Bryson).', fv:'Emotional vocabulary builds self-regulation.' },
  { id:'c002', title:'Turn-Taking Card Game', stages:['s2','s3','s4'], pillar:'teamwork', stream:'character', block:'learn', duration:10, location:'indoor', materials:['Uno or Go Fish'], desc:'Simple card game with strict turn order. Celebrate waiting. Source: How to Talk So Kids Will Listen (Faber/Mazlish).', fv:'Delayed gratification is a muscle.' },
  { id:'c003', title:'Apology Script Practice', stages:['s2','s3','s4','s5'], pillar:'relationships', stream:'character', block:'learn', duration:5, location:'indoor', materials:[], desc:'Three-part apology: "I\'m sorry I ___. I know that made you feel ___. Next time I will ___." Practice with puppets or role-play.', fv:'Repair is more important than the mistake.' },
  { id:'c004', title:'Feeling Puppets', stages:['s1','s2','s3'], pillar:'storytelling', stream:'character', block:'learn', duration:10, location:'indoor', materials:['puppets or stuffed animals'], desc:'Each puppet shows a face. "How is this one feeling?" Then "Show me on your face." Emotional naming through play.', fv:'Name it to tame it.' },
  { id:'c005', title:'Perspective-Taking Story', stages:['s2','s3','s4','s5'], pillar:'storytelling', stream:'character', block:'learn', duration:15, location:'indoor', materials:['picture book'], desc:'After a read-aloud, ask: "How do you think ___ felt when ___?" Switch character. Source: Carol Dweck + Siegel.', fv:'Other people have whole worlds inside them.' },
  { id:'c006', title:'Frustration Box Ritual', stages:['s2','s3','s4','s5'], pillar:'grit', stream:'character', block:'learn', duration:10, location:'indoor', materials:['small box','paper'], desc:'When frustrated, child draws or crumples paper and puts it "in the box." Externalizes the feeling. Then tries again. Source: Whole Brain Child.', fv:'Feelings are weather — they pass.' },
  { id:'c007', title:'Helpfulness Job', stages:['s2','s3','s4','s5'], pillar:'teamwork', stream:'character', block:'exploration', duration:10, location:'indoor', materials:[], desc:'One real household job: carrying groceries, sorting laundry, wiping the table. Genuine contribution, not play-pretend helping.', fv:'Capable kids become capable adults.' },
  { id:'c008', title:'Gratitude List', stages:['s2','s3','s4','s5'], pillar:'relationships', stream:'character', block:'learn', duration:5, location:'indoor', materials:['notebook'], desc:'Three things you\'re grateful for. Toddlers: draw them. Older: write. Do it daily for a week and track if mood changes. Source: Lori Santos Yale Happiness.', fv:'Gratitude rewires attention.' },
  { id:'c009', title:'Kindness Chain', stages:['s2','s3','s4','s5'], pillar:'teamwork', stream:'character', block:'learn', duration:10, location:'indoor', materials:['paper strips','stapler'], desc:'Every kind act today gets a paper link. At bedtime count the chain. How long can we make it this week?', fv:'Kindness is a daily practice, not a character trait.' },
  { id:'c010', title:'"What Would They Feel?" Game', stages:['s3','s4','s5','s6'], pillar:'relationships', stream:'character', block:'learn', duration:10, location:'indoor', materials:[], desc:'Read a scenario: "You take your friend\'s toy by mistake. They look upset. What are they feeling? What do you do?" Rotate roles.', fv:'Empathy is a skill not a feeling.' },
  { id:'c011', title:'Growth Mindset Story', stages:['s2','s3','s4','s5'], pillar:'grit', stream:'character', block:'learn', duration:10, location:'indoor', materials:['sticky notes'], desc:'Tell a story where the hero fails, says "Not yet," tries again, succeeds. Child retells it. Source: Carol Dweck Mindset.', fv:'"I can\'t" becomes "I can\'t yet."' },
  { id:'c012', title:'Mindful Breathing (Balloon Breath)', stages:['s2','s3','s4','s5'], pillar:'grit', stream:'character', block:'learn', duration:5, location:'indoor', materials:[], desc:'Breathe in slowly to "fill the balloon," breathe out to deflate. Three rounds. Use before a hard task or after frustration.', fv:'Regulation is a superpower.' },
  { id:'c013', title:'Problem-Solving Cube', stages:['s3','s4','s5','s6'], pillar:'grit', stream:'character', block:'learn', duration:15, location:'indoor', materials:['cube or dice'], desc:'Present a social problem. Roll the cube — each face is a solution strategy: ignore, walk away, use words, ask an adult, compromise, wait. Pick the best one and explain why.', fv:'There is always another option.' },
  { id:'c014', title:'Being a Good Friend Role-Play', stages:['s2','s3','s4','s5'], pillar:'relationships', stream:'character', block:'learn', duration:10, location:'indoor', materials:[], desc:'Act out: someone is left out of the game. What do you do? Someone is crying. Someone brags. Practice the response, not just the rule.', fv:'Friendship is a skill.' },
  { id:'c015', title:'Compliment Circle', stages:['s2','s3','s4','s5'], pillar:'teamwork', stream:'character', block:'learn', duration:5, location:'indoor', materials:[], desc:'Each person says one genuine specific compliment about the next person. "I liked it when you ___." Teaches specificity and noticing others.', fv:'Say the good thing out loud.' },
];

// ── STREAM 3: ACADEMIC FOUNDATIONS (TDSB/YRDSB K-3) ──────────────────────────
const ACADEMIC_ACTIVITIES = [
  { id:'ac001', title:'Engelmann Sound Drill', stages:['s2','s3','s4'], pillar:'storytelling', stream:'academic', block:'learn', duration:5, location:'indoor', materials:['sound cards'], desc:'Point to each card: "What sound?" 3-second wait, model once, move on. Track which sounds need more reps. Source: Teach Your Child to Read in 100 Easy Lessons.', fv:'Phonics before reading — always.' },
  { id:'ac002', title:'Decodable Reader Read-Aloud', stages:['s2','s3','s4'], pillar:'storytelling', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['Bob Books or Alphabetti reader'], desc:'Read one short decodable book aloud together. Finger-track each word. Ask: "What happened?" one question after. Source: Bob Books, Alphabetti readers.', fv:'Reading is decoding — not memorizing.' },
  { id:'ac003', title:'Sight Word Flashcards', stages:['s2','s3','s4','s5'], pillar:'storytelling', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['flashcards'], desc:'Dolch pre-primer or primer list. 5 new words per session, review 10 old ones. Track mastered words in appState trackers.', fv:'Fluency comes from automaticity.' },
  { id:'ac004', title:'Number Line Counting', stages:['s2','s3','s4'], pillar:'entrepreneurship', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['number line printout','counters'], desc:'Count forward and back on a number line. Skip count by 2s. Fill in missing numbers. Source: Ontario K-3 Number strand.', fv:'Numbers have a structure — feel the pattern.' },
  { id:'ac005', title:'Simple Addition with Blocks', stages:['s2','s3','s4'], pillar:'entrepreneurship', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['Duplo blocks or coins'], desc:'Build two towers, count both, combine. Write the equation. Keep it under 10. Progress to 5+5, then 6+4. Source: Ontario K-3 Math.', fv:'Concrete before abstract — always.' },
  { id:'ac006', title:'Place Value Towers', stages:['s3','s4','s5'], pillar:'entrepreneurship', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['base-10 blocks or straws'], desc:'Tens and ones. Show "23" with straws — 2 bundles of 10 + 3 singles. Swap: "How many tens in 40?" Source: Ontario Grade 1-2 Math.', fv:'Our number system is brilliant — show it.' },
  { id:'ac007', title:'BFSU Nature Observation', stages:['s2','s3','s4','s5'], pillar:'grit', stream:'academic', block:'exploration', duration:15, location:'outdoor', materials:['magnifying glass','notebook'], desc:'Find one thing outside — bug, leaf, cloud, puddle. Observe for 2 minutes. Draw it. One question: "Why do you think it\'s like that?" Source: Building Foundations of Scientific Understanding.', fv:'Science starts with noticing.' },
  { id:'ac008', title:'Mystery Science Video + Talk', stages:['s3','s4','s5'], pillar:'storytelling', stream:'academic', block:'learn', duration:20, location:'indoor', materials:['device'], desc:'One short Mystery Science video. Pause twice and ask "What do you think will happen?" At the end: "Explain it to me like I don\'t know." Source: mysteryscience.com.', fv:'Science is explained, not just watched.' },
  { id:'ac009', title:'Community Helper Stories', stages:['s2','s3','s4'], pillar:'teamwork', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['picture books'], desc:'Read a book about a firefighter, nurse, or builder. Ask: "What job does that person do? Why does it matter?" Connect to people they know. Source: TDSB Social Studies K-3.', fv:'Society runs on people who show up.' },
  { id:'ac010', title:'Drawing + Coloring Time', stages:['s1','s2','s3','s4'], pillar:'storytelling', stream:'academic', block:'learn', duration:10, location:'indoor', materials:['crayons','paper'], desc:'Free draw or follow a step-by-step directed drawing (Ed Emberly style). Fine motor, spatial awareness, and creative expression in one.', fv:'Making things is thinking.' },

function getTodayLesson(childId, stageId, dateStr) {
  var eligible = LESSON_PLANS.filter(function(l) {
    return l.stages.includes(stageId) && l.childAffinity.includes(childId);
  });
  if (!eligible.length) return null;
  var shuffled = dateSeededShuffle(eligible, dateStr + childId + 'lesson');
  // Skip recently done lessons (check last 14 days of checkins for lesson id)
  var fresh = shuffled.filter(function(l) { return recentlyDoneFromCheckins(childId, l.id, 14) === 0; });
  return (fresh.length ? fresh[0] : shuffled[0]);
}

function renderLessonCard(lesson) {
  var sourceColors = {
    'Engelmann': '#dbeafe',
    'Alphabetti': '#fce7f3',
    'Reception RLP': '#dcfce7',
    'Reception Rp': '#d1fae5',
    'Reception': '#f0fdf4',
    'BFSU Science': '#fef3c7'
  };
  var bg = sourceColors[lesson.source] || '#f1f5f9';
  var borderColor = bg.replace(/e7|e4|e7|d1|f0|f3/g, 'c');
  return '<div style="background:' + bg + ';border:1px solid #cbd5e1;border-radius:8px;padding:10px 13px;margin-bottom:10px">' +
    '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">' +
    '<span style="font-size:0.68em;font-weight:700;color:#0369a1;background:#e0f2fe;border-radius:4px;padding:2px 6px;text-transform:uppercase">Today\'s Lesson</span>' +
    '<span style="font-size:0.68em;font-weight:700;color:#555;background:#fff;border:1px solid #e0e0e0;border-radius:4px;padding:1px 5px">' + lesson.source + '</span>' +
    '<span style="font-size:0.68em;color:#888;margin-left:auto">' + lesson.durationMin + ' min</span>' +
    '</div>' +
    '<div style="font-weight:600;font-size:0.88em;color:#1e293b;margin-bottom:3px">' + lesson.title + '</div>' +
    '<div style="font-size:0.78em;color:#475569;margin-bottom:6px">' + lesson.notes + '</div>' +
    '<a href="' + lesson.fileLink + '" target="_blank" style="display:inline-block;font-size:0.74em;background:#1a73e8;color:#fff;padding:3px 10px;border-radius:6px;text-decoration:none" onclick="event.stopPropagation()">Open material</a>' +
    '</div>';
}

function updateSyncStatus(text, state) {
